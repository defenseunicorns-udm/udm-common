kind: ZarfPackageConfig
metadata:
  name: nginx
  description: UDS nginx package
  version: 0.13.4
variables:
  - name: DOMAIN
    default: uds.dev
components:
  - name: nginx
    required: true
    description: Deploy nginx with upstream images
    import:
      path: common
    charts:
      - name: nginx
        valuesFiles:
          - values/upstream-values.yaml
    images:
      - nginx:1.29.8
