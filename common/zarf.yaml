kind: ZarfPackageConfig
metadata:
  name: nginx
  description: UDS Common Nginx Example
  version: 0.10.3-dev-006
components:
  - name: nginx
    required: true
    charts:
      - name: uds-nginx-config
        namespace: nginx
        version: 0.1.0
        localPath: ../chart
      - name: nginx
        version: 0.1.0
        namespace: nginx
        localPath: ../src/nginx
        valuesFiles:
          - ../values/common-values.yaml
