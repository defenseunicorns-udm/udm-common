name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  test-tasks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: UDS CLI Setup
        uses: ./.github/actions/uds-cli-setup

      - name: Run task integration tests
        run: uds run test

  scan-vouch-publish:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: UDS CLI Setup
        uses: ./.github/actions/uds-cli-setup

      - name: Witness Run Lint
        run: uds run attest:lint
        
      - name: Security Scan
        run: |
          uds run scan:security \
            --with opengrep_scan_path=src/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Vouch Package and Publish
        env:
          OLM_REGISTRY: "registry.uds-mil.us"
          OLM_REGISTRY_USER: ${{ secrets.REGISTRY_USER_ID }}
          OLM_REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          uds run vouch:package \
            --with github_token="${{ secrets.GITHUB_TOKEN }}" \
            --with olm_cat="${{ secrets.OLM_CAT }}" \
            --with olm_org="${{ secrets.OLM_ORG }}" \
            --with attestations="gitleaks-witness.json,opengrep-witness.json,lint-witness.json" \
            --with sarif_files="gitleaks.sarif.json,opengrep.sarif.json"
      # - name: Publish
      #   run: |
      #     uds run publish:zarf-package \
      #       --with registry="registry.uds-mil.us" \
      #       --with registry_org="${{ secrets.REGISTRY_ORG }}" \
      #       --with registry_user_id="${{ secrets.REGISTRY_USER_ID }}" \
      #       --with registry_password="${{ secrets.REGISTRY_PASSWORD }}"
