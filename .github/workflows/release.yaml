name: Release

on:
  push:
    branches:
      - main

# Permissions for the GITHUB_TOKEN used by the workflow.
permissions:
  contents: read # Allows reading the content of the repository.
  packages: read # Allows reading the content of the repository's packages.
  id-token: write

jobs:
  tag-new-version:
    permissions: write-all
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release-flag.outputs.release_created }}
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - name: Create Release Tag
        id: tag
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0
      - id: release-flag
        run: echo "release_created=${{ steps.tag.outputs.release_created || false }}" >> "$GITHUB_OUTPUT"

  enrich-release-notes:
    needs: tag-new-version
    if: needs.tag-new-version.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Append PR summaries to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.tag-new-version.outputs.tag_name }}"
          REPO="${{ github.repository }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)

          SEEN=""
          EXTRA=$(mktemp)

          git log "${PREV_TAG}..${TAG}" --format="%H" | while read -r SHA; do
            PR_JSON=$(gh api "/repos/${REPO}/commits/${SHA}/pulls" \
              -H "Accept: application/vnd.github+json" 2>/dev/null \
              | jq -c '.[0] // empty')
            [ -z "$PR_JSON" ] && continue

            NUM=$(echo "$PR_JSON" | jq -r '.number')
            echo "$SEEN" | grep -q ":${NUM}:" && continue
            SEEN="${SEEN}:${NUM}:"

            SUMMARY=$(echo "$PR_JSON" | jq -r '.body // ""' \
              | awk '/^## Summary/{f=1;next} /^## /{if(f)exit} f && NF{print}' \
              | head -20)
            [ -z "$SUMMARY" ] && continue

            printf '\n### PR #%s\n\n%s\n' "$NUM" "$SUMMARY" >> "$EXTRA"
          done

          if [ -s "$EXTRA" ]; then
            BODY=$(mktemp)
            gh release view "$TAG" --json body -q .body > "$BODY"
            printf '\n---\n\n## Details\n' >> "$BODY"
            cat "$EXTRA" >> "$BODY"
            gh release edit "$TAG" --notes-file "$BODY"
          fi
