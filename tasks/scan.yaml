# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/maru-runner/refs/heads/main/tasks.schema.json

tasks:

  - name: install-gitleaks
    description: Download and install Gitleaks to $HOME/.local/bin
    inputs:
      version:
        description: Gitleaks version to install (no v prefix)
        default: 8.30.1
    actions:
      - description: Install Gitleaks
        shell:
          linux: bash
          darwin: bash
        cmd: |
          get_os() {
            case "$(uname -s)" in
              Linux)  echo "linux" ;;
              Darwin) echo "darwin" ;;
              *) echo "Unsupported OS: $(uname -s)" >&2; return 1 ;;
            esac
          }
          get_arch() {
            case "$(uname -m)" in
              x86_64)        echo "amd64" ;;
              aarch64|arm64) echo "arm64" ;;
              *) echo "Unsupported architecture: $(uname -m)" >&2; return 1 ;;
            esac
          }
          install_from_tarball() {
            local name="$1" url="$2" inner="${3:-$1}"
            local tmp
            tmp="$(mktemp -d)"
            # shellcheck disable=SC2064
            trap "rm -rf '$tmp'" RETURN
            curl -fSL "$url" | tar -xz -C "$tmp" "$inner"
            mkdir -p "$HOME/.local/bin"
            mv "$tmp/$inner" "$HOME/.local/bin/$name"
            chmod +x "$HOME/.local/bin/$name"
            echo "$name installed to $HOME/.local/bin/$name"
          }
          VERSION="${{ .inputs.version }}"
          OS="$(get_os)"
          ARCH_RAW="$(get_arch)"
          case "$ARCH_RAW" in
            amd64) ARCH="x64" ;;
            arm64) ARCH="arm64" ;;
          esac
          install_from_tarball gitleaks \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_${OS}_${ARCH}.tar.gz" \
            gitleaks

  - name: install-opengrep
    description: Download and install OpenGrep to $HOME/.local/bin (Linux x86_64 only)
    inputs:
      version:
        description: OpenGrep version to install
        default: v1.19.0
    actions:
      - description: Install OpenGrep
        shell:
          linux: bash
          darwin: bash
        cmd: |
          get_os() {
            case "$(uname -s)" in
              Linux)  echo "linux" ;;
              Darwin) echo "darwin" ;;
              *) echo "Unsupported OS: $(uname -s)" >&2; return 1 ;;
            esac
          }
          get_arch() {
            case "$(uname -m)" in
              x86_64)        echo "amd64" ;;
              aarch64|arm64) echo "arm64" ;;
              *) echo "Unsupported architecture: $(uname -m)" >&2; return 1 ;;
            esac
          }
          install_binary() {
            local name="$1" url="$2"
            mkdir -p "$HOME/.local/bin"
            curl -fSL "$url" -o "$HOME/.local/bin/$name"
            chmod +x "$HOME/.local/bin/$name"
            echo "$name installed to $HOME/.local/bin/$name"
          }
          OS="$(get_os)"
          ARCH="$(get_arch)"
          if [ "$OS" != "linux" ] || [ "$ARCH" != "amd64" ]; then
            echo "OpenGrep is only available for Linux x86_64; skipping on ${OS}/${ARCH}"
            exit 0
          fi
          VERSION="${{ .inputs.version }}"
          install_binary opengrep \
            "https://github.com/opengrep/opengrep/releases/download/${VERSION}/opengrep_manylinux_x86"

  - name: gitleaks
    description: Run Gitleaks secrets scan with Witness attestation
    inputs:
      gitleaks_version:
        description: Gitleaks version to install (no v prefix)
        default: 8.30.1
      gitleaks_scan_path:
        description: Directory to scan.
        default: .
      witness_key_path:
        description: Path to a local signing key for Witness.
        default: ""
      witness_workingdir:
        description: Directory for Witness to run the attested command from. Use the caller repository workspace in composite actions so the git attestor sees a real checkout.
        default: ""
      enable_sigstore:
        description: Sign the attestation with Sigstore/Fulcio.
        default: "true"
      fulcio_oidc_issuer:
        description: OIDC issuer URL for Sigstore/Fulcio signing. Override for non-GitHub CI providers (e.g. https://gitlab.com).
        default: https://token.actions.githubusercontent.com
    actions:
      - description: Install tools and run attested Gitleaks scan
        shell:
          linux: bash
          darwin: bash
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          GITLEAKS_SCAN_PATH="${{ .inputs.gitleaks_scan_path }}"
          WITNESS_KEY_PATH="${{ .inputs.witness_key_path }}"
          WITNESS_WORKINGDIR="${{ .inputs.witness_workingdir }}"
          ENABLE_SIGSTORE="${{ .inputs.enable_sigstore }}"
          FULCIO_OIDC_ISSUER="${{ .inputs.fulcio_oidc_issuer }}"
          OUTPUT_DIR="$(pwd)"
          GITLEAKS_SARIF="${OUTPUT_DIR}/gitleaks.sarif.json"
          GITLEAKS_WITNESS="${OUTPUT_DIR}/gitleaks-witness.json"

          uds run scan:install-gitleaks --with version="${{ .inputs.gitleaks_version }}"

          # Base Gitleaks Command
          # Resolve the default branch from local refs only. `git remote show`
          # reaches out to the network and can make otherwise-local scans fail.
          DEFAULT_BRANCH=""
          if DEFAULT_REF="$(git -C "$GITLEAKS_SCAN_PATH" symbolic-ref --quiet --short refs/remotes/origin/HEAD 2>/dev/null)"; then
            DEFAULT_BRANCH="${DEFAULT_REF#origin/}"
          fi
          # Some CI checkouts do not create origin/HEAD, so fall back to the
          # common default branch names as long as the refs exist locally.
          if [ -z "$DEFAULT_BRANCH" ]; then
            for BRANCH in main master; do
              if git -C "$GITLEAKS_SCAN_PATH" rev-parse --verify --quiet "origin/${BRANCH}" >/dev/null; then
                DEFAULT_BRANCH="$BRANCH"
                break
              fi
            done
          fi
          if [ -z "$DEFAULT_BRANCH" ] || ! git -C "$GITLEAKS_SCAN_PATH" rev-parse --verify --quiet "origin/${DEFAULT_BRANCH}" >/dev/null; then
            echo "Unable to find a local origin default branch ref for Gitleaks scanning."
            echo "Fetch origin/main or origin/master before running scan:gitleaks."
            exit 1
          fi

          # Scan only tracked commits in the current package iteration. This
          # avoids local-only files such as .env files and generated witness or
          # SARIF artifacts while still respecting the requested scan path.
          GITLEAKS_LOG_OPTS="origin/${DEFAULT_BRANCH}..HEAD -- ."
          GITLEAKS_CMD=(gitleaks git "$GITLEAKS_SCAN_PATH" --log-opts="$GITLEAKS_LOG_OPTS" --verbose --report-format sarif --report-path "$GITLEAKS_SARIF")
          rm -f "$GITLEAKS_WITNESS"

          WITNESS_ARGS=(-a=environment -a=git)
          SHOULD_WITNESS="false"

          if [ -n "$WITNESS_KEY_PATH" ]; then
            SHOULD_WITNESS="true"
            if [ ! -f "$WITNESS_KEY_PATH" ]; then
              echo "Witness key file does not exist: $WITNESS_KEY_PATH"
              exit 1
            fi
            WITNESS_ARGS+=(--signer-file-key-path "$WITNESS_KEY_PATH")
          elif [ "$ENABLE_SIGSTORE" = "true" ]; then
            SHOULD_WITNESS="true"
            WITNESS_ARGS+=(
              --signer-fulcio-url=https://fulcio.sigstore.dev
              --signer-fulcio-oidc-client-id=sigstore
              --signer-fulcio-oidc-issuer="$FULCIO_OIDC_ISSUER"
              --timestamp-servers=https://timestamp.sigstore.dev/api/v1/timestamp
            )
            if [ -n "${SIGSTORE_ID_TOKEN:-}" ]; then
              WITNESS_ARGS+=(--signer-fulcio-token "$SIGSTORE_ID_TOKEN")
            fi
          fi
          if [ -n "$WITNESS_WORKINGDIR" ]; then
            WITNESS_ARGS+=(--workingdir "$WITNESS_WORKINGDIR")
          fi

          if [ "$SHOULD_WITNESS" = "true" ]; then
            uds run setup:witness
            witness run "${WITNESS_ARGS[@]}" -s=gitleaks --outfile="$GITLEAKS_WITNESS" -- "${GITLEAKS_CMD[@]}"
          else
            echo "No signing key or Sigstore enabled. Running Gitleaks without Witness attestation."
            "${GITLEAKS_CMD[@]}"
          fi

  - name: opengrep
    description: Run OpenGrep SAST scan with Witness attestation (Linux x86_64 only)
    inputs:
      opengrep_version:
        description: OpenGrep version to install
        default: v1.19.0
      opengrep_scan_path:
        description: Path to scan with OpenGrep
        default: .
      witness_key_path:
        description: Path to a local signing key for Witness.
        default: ""
      witness_workingdir:
        description: Directory for Witness to run the attested command from. Use the caller repository workspace in composite actions so the git attestor sees a real checkout.
        default: ""
      enable_sigstore:
        description: Sign the attestation with Sigstore/Fulcio.
        default: "false"
      fulcio_oidc_issuer:
        description: OIDC issuer URL for Sigstore/Fulcio signing. Override for non-GitHub CI providers (e.g. https://gitlab.com).
        default: https://token.actions.githubusercontent.com
    actions:
      - description: Install tools and run attested OpenGrep scan
        shell:
          linux: bash
          darwin: bash
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          OS="$(uname -s)"
          ARCH="$(uname -m)"
          if [ "$OS" != "Linux" ] || [ "$ARCH" != "x86_64" ]; then
            echo "OpenGrep is only available for Linux x86_64; skipping on ${OS}/${ARCH}"
            exit 0
          fi

          OPENGREP_SCAN_PATH="${{ .inputs.opengrep_scan_path }}"
          WITNESS_KEY_PATH="${{ .inputs.witness_key_path }}"
          WITNESS_WORKINGDIR="${{ .inputs.witness_workingdir }}"
          ENABLE_SIGSTORE="${{ .inputs.enable_sigstore }}"
          FULCIO_OIDC_ISSUER="${{ .inputs.fulcio_oidc_issuer }}"
          OUTPUT_DIR="$(pwd)"
          OPENGREP_SARIF="${OUTPUT_DIR}/opengrep.sarif.json"
          OPENGREP_WITNESS="${OUTPUT_DIR}/opengrep-witness.json"

          uds run scan:install-opengrep --with version="${{ .inputs.opengrep_version }}"

          # Base OpenGrep Command
          OPENGREP_CMD=(opengrep scan "$OPENGREP_SCAN_PATH" --sarif --sarif-output "$OPENGREP_SARIF")
          rm -f "$OPENGREP_WITNESS"

          WITNESS_ARGS=(-a=environment -a=git)
          SHOULD_WITNESS="false"

          if [ -n "$WITNESS_KEY_PATH" ]; then
            SHOULD_WITNESS="true"
            if [ ! -f "$WITNESS_KEY_PATH" ]; then
              echo "Witness key file does not exist: $WITNESS_KEY_PATH"
              exit 1
            fi
            WITNESS_ARGS+=(--signer-file-key-path "$WITNESS_KEY_PATH")
          elif [ "$ENABLE_SIGSTORE" = "true" ]; then
            SHOULD_WITNESS="true"
            WITNESS_ARGS+=(
              --signer-fulcio-url=https://fulcio.sigstore.dev
              --signer-fulcio-oidc-client-id=sigstore
              --signer-fulcio-oidc-issuer="$FULCIO_OIDC_ISSUER"
              --timestamp-servers=https://timestamp.sigstore.dev/api/v1/timestamp
            )
            if [ -n "${SIGSTORE_ID_TOKEN:-}" ]; then
              WITNESS_ARGS+=(--signer-fulcio-token "$SIGSTORE_ID_TOKEN")
            fi
          fi
          if [ -n "$WITNESS_WORKINGDIR" ]; then
            WITNESS_ARGS+=(--workingdir "$WITNESS_WORKINGDIR")
          fi

          if [ "$SHOULD_WITNESS" = "true" ]; then
            uds run setup:witness
            witness run "${WITNESS_ARGS[@]}" -s=opengrep --outfile="$OPENGREP_WITNESS" -- "${OPENGREP_CMD[@]}"
          else
            echo "No signing key or Sigstore enabled. Running OpenGrep without Witness attestation."
            "${OPENGREP_CMD[@]}"
          fi

  - name: security
    description: Run Gitleaks and OpenGrep security scans with Witness attestation
    inputs:
      gitleaks_version:
        description: Gitleaks version to install
        default: 8.30.1
      gitleaks_scan_path:
        default: .
      opengrep_version:
        default: v1.19.0
      opengrep_scan_path:
        default: .
      witness_key_path:
        default: ""
      witness_workingdir:
        default: ""
      enable_sigstore:
        default: "true"
      enable_archivista:
        default: "false"
      run_opengrep:
        default: "true"
      fulcio_oidc_issuer:
        description: OIDC issuer URL for Sigstore/Fulcio signing. Override for non-GitHub CI providers (e.g. https://gitlab.com).
        default: https://token.actions.githubusercontent.com
    actions:
      - description: Run Gitleaks and optionally OpenGrep with Witness attestation
        shell:
          linux: bash
          darwin: bash
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          GITLEAKS_VERSION="${{ .inputs.gitleaks_version }}"
          GITLEAKS_SCAN_PATH="${{ .inputs.gitleaks_scan_path }}"
          OPENGREP_VERSION="${{ .inputs.opengrep_version }}"
          OPENGREP_SCAN_PATH="${{ .inputs.opengrep_scan_path }}"
          WITNESS_KEY_PATH="${{ .inputs.witness_key_path }}"
          WITNESS_WORKINGDIR="${{ .inputs.witness_workingdir }}"
          ENABLE_SIGSTORE="${{ .inputs.enable_sigstore }}"
          FULCIO_OIDC_ISSUER="${{ .inputs.fulcio_oidc_issuer }}"
          RUN_OPENGREP="${{ .inputs.run_opengrep }}"

          GITLEAKS_OPTS=(
            --with gitleaks_version="$GITLEAKS_VERSION"
            --with gitleaks_scan_path="$GITLEAKS_SCAN_PATH"
            --with enable_sigstore="$ENABLE_SIGSTORE"
            --with fulcio_oidc_issuer="$FULCIO_OIDC_ISSUER"
          )
          [ -n "$WITNESS_KEY_PATH" ] && GITLEAKS_OPTS+=(--with witness_key_path="$WITNESS_KEY_PATH")
          [ -n "$WITNESS_WORKINGDIR" ] && GITLEAKS_OPTS+=(--with witness_workingdir="$WITNESS_WORKINGDIR")

          uds run scan:gitleaks "${GITLEAKS_OPTS[@]}"

          if [ "$RUN_OPENGREP" = "true" ]; then
            OPENGREP_OPTS=(
              --with opengrep_version="$OPENGREP_VERSION"
              --with opengrep_scan_path="$OPENGREP_SCAN_PATH"
              --with enable_sigstore="$ENABLE_SIGSTORE"
              --with fulcio_oidc_issuer="$FULCIO_OIDC_ISSUER"
            )
            [ -n "$WITNESS_KEY_PATH" ] && OPENGREP_OPTS+=(--with witness_key_path="$WITNESS_KEY_PATH")
            [ -n "$WITNESS_WORKINGDIR" ] && OPENGREP_OPTS+=(--with witness_workingdir="$WITNESS_WORKINGDIR")
            uds run scan:opengrep "${OPENGREP_OPTS[@]}"
          fi

          echo "==> Security scan complete"
