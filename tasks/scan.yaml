# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/maru-runner/refs/heads/main/tasks.schema.json

tasks:

  - name: install-gitleaks
    description: Download and install Gitleaks to $HOME/.local/bin
    inputs:
      version:
        description: Gitleaks version to install (no v prefix)
        default: 8.30.1
    actions:
      - description: Install Gitleaks
        shell:
          linux: bash
          darwin: bash
        cmd: |
          get_os() {
            case "$(uname -s)" in
              Linux)  echo "linux" ;;
              Darwin) echo "darwin" ;;
              *) echo "Unsupported OS: $(uname -s)" >&2; return 1 ;;
            esac
          }
          get_arch() {
            case "$(uname -m)" in
              x86_64)        echo "amd64" ;;
              aarch64|arm64) echo "arm64" ;;
              *) echo "Unsupported architecture: $(uname -m)" >&2; return 1 ;;
            esac
          }
          install_from_tarball() {
            local name="$1" url="$2" inner="${3:-$1}"
            local tmp
            tmp="$(mktemp -d)"
            # shellcheck disable=SC2064
            trap "rm -rf '$tmp'" RETURN
            curl -fSL "$url" | tar -xz -C "$tmp" "$inner"
            mkdir -p "$HOME/.local/bin"
            mv "$tmp/$inner" "$HOME/.local/bin/$name"
            chmod +x "$HOME/.local/bin/$name"
            echo "$name installed to $HOME/.local/bin/$name"
          }
          VERSION="${{ .inputs.version }}"
          OS="$(get_os)"
          ARCH_RAW="$(get_arch)"
          case "$ARCH_RAW" in
            amd64) ARCH="x64" ;;
            arm64) ARCH="arm64" ;;
          esac
          install_from_tarball gitleaks \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_${OS}_${ARCH}.tar.gz" \
            gitleaks

  - name: install-opengrep
    description: Download and install OpenGrep to $HOME/.local/bin (Linux x86_64 only)
    inputs:
      version:
        description: OpenGrep version to install
        default: v1.19.0
    actions:
      - description: Install OpenGrep
        shell:
          linux: bash
          darwin: bash
        cmd: |
          get_os() {
            case "$(uname -s)" in
              Linux)  echo "linux" ;;
              Darwin) echo "darwin" ;;
              *) echo "Unsupported OS: $(uname -s)" >&2; return 1 ;;
            esac
          }
          get_arch() {
            case "$(uname -m)" in
              x86_64)        echo "amd64" ;;
              aarch64|arm64) echo "arm64" ;;
              *) echo "Unsupported architecture: $(uname -m)" >&2; return 1 ;;
            esac
          }
          install_binary() {
            local name="$1" url="$2"
            mkdir -p "$HOME/.local/bin"
            curl -fSL "$url" -o "$HOME/.local/bin/$name"
            chmod +x "$HOME/.local/bin/$name"
            echo "$name installed to $HOME/.local/bin/$name"
          }
          OS="$(get_os)"
          ARCH="$(get_arch)"
          if [ "$OS" != "linux" ] || [ "$ARCH" != "amd64" ]; then
            echo "OpenGrep is only available for Linux x86_64; skipping on ${OS}/${ARCH}"
            exit 0
          fi
          VERSION="${{ .inputs.version }}"
          install_binary opengrep \
            "https://github.com/opengrep/opengrep/releases/download/${VERSION}/opengrep_manylinux_x86"

  - name: gitleaks
    description: Run Gitleaks secrets scan with Witness attestation
    inputs:
      gitleaks_version:
        description: Gitleaks version to install (no v prefix)
        default: 8.30.1
      gitleaks_scan_path:
        description: Directory to scan.
        default: .
      witness_key_path:
        description: Path to a local signing key for Witness. Leave empty to sign via the configured fulcio_url.
        default: ""
      witness_workingdir:
        description: Directory for Witness to run the attested command from. Use the caller repository workspace in composite actions so the git attestor sees a real checkout.
        default: ""
      enable_sigstore:
        description: Sign the attestation with Fulcio. Set to false to skip Witness attestation entirely.
        default: "true"
      fulcio_url:
        description: Fulcio instance URL for keyless Witness signing. Defaults to the production CAT Fulcio; override per environment, e.g. https://fulcio.uds.run for staging.
        default: https://fulcio.uds-mil.us
    actions:
      - description: Install Gitleaks
        task: install-gitleaks
        with:
          version: ${{ .inputs.gitleaks_version }}

      - description: Install tools and run attested Gitleaks scan
        shell:
          linux: bash
          darwin: bash
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          GITLEAKS_SCAN_PATH="${{ .inputs.gitleaks_scan_path }}"
          WITNESS_KEY_PATH="${{ .inputs.witness_key_path }}"
          WITNESS_WORKINGDIR="${{ .inputs.witness_workingdir }}"
          ENABLE_SIGSTORE="${{ .inputs.enable_sigstore }}"
          OUTPUT_DIR="$(pwd)"
          GITLEAKS_SARIF="${OUTPUT_DIR}/gitleaks.sarif.json"
          GITLEAKS_WITNESS="${OUTPUT_DIR}/gitleaks-witness.json"

          # Base Gitleaks Command
          # Resolve the default branch. Prefer local refs to avoid network
          # calls, but fall back to CI env vars + a shallow fetch for shallow
          # CI checkouts (e.g. actions/checkout fetch-depth:1 on a PR).
          DEFAULT_BRANCH=""
          if DEFAULT_REF="$(git -C "$GITLEAKS_SCAN_PATH" symbolic-ref --quiet --short refs/remotes/origin/HEAD 2>/dev/null)"; then
            DEFAULT_BRANCH="${DEFAULT_REF#origin/}"
          fi
          # Some CI checkouts do not create origin/HEAD; check common names.
          if [ -z "$DEFAULT_BRANCH" ]; then
            for BRANCH in main master; do
              if git -C "$GITLEAKS_SCAN_PATH" rev-parse --verify --quiet "origin/${BRANCH}" >/dev/null 2>&1; then
                DEFAULT_BRANCH="$BRANCH"
                break
              fi
            done
          fi
          # Shallow PR checkouts (GitHub Actions fetch-depth:1, GitLab MR
          # pipelines) may not fetch the target branch at all. Use CI env vars
          # as a hint and do a single-depth fetch to make the ref available.
          if [ -z "$DEFAULT_BRANCH" ]; then
            for CANDIDATE in "${GITHUB_BASE_REF:-}" "${CI_DEFAULT_BRANCH:-}" "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-}"; do
              [ -n "$CANDIDATE" ] || continue
              git -C "$GITLEAKS_SCAN_PATH" fetch --depth=1 origin "$CANDIDATE" 2>/dev/null || true
              if git -C "$GITLEAKS_SCAN_PATH" rev-parse --verify --quiet "origin/${CANDIDATE}" >/dev/null 2>&1; then
                DEFAULT_BRANCH="$CANDIDATE"
                break
              fi
            done
          fi
          # Last resort: try fetching the two most common default branch names.
          if [ -z "$DEFAULT_BRANCH" ]; then
            for BRANCH in main master; do
              git -C "$GITLEAKS_SCAN_PATH" fetch --depth=1 origin "$BRANCH" 2>/dev/null || true
              if git -C "$GITLEAKS_SCAN_PATH" rev-parse --verify --quiet "origin/${BRANCH}" >/dev/null 2>&1; then
                DEFAULT_BRANCH="$BRANCH"
                break
              fi
            done
          fi

          # Fail fast if we still have no base ref — a full history scan would
          # exceed the intended scope (only commits in this branch/package).
          if [ -z "$DEFAULT_BRANCH" ]; then
            echo "ERROR: could not resolve origin default branch for gitleaks scan."
            echo "Set GITHUB_BASE_REF (GitHub Actions) or CI_DEFAULT_BRANCH (GitLab) and ensure"
            echo "the runner can reach the remote, or pre-fetch origin/main before running this task."
            exit 1
          fi

          # Scan only commits added in this branch since the default branch.
          GITLEAKS_LOG_OPTS="origin/${DEFAULT_BRANCH}..HEAD -- ."
          GITLEAKS_CMD=(gitleaks git "$GITLEAKS_SCAN_PATH" --log-opts="$GITLEAKS_LOG_OPTS" --verbose --report-format sarif --report-path "$GITLEAKS_SARIF")
          rm -f "$GITLEAKS_WITNESS"

          WITNESS_ARGS=(-a=environment -a=git)
          SHOULD_WITNESS="false"

          if [ -n "$WITNESS_KEY_PATH" ]; then
            SHOULD_WITNESS="true"
            if [ ! -f "$WITNESS_KEY_PATH" ]; then
              echo "Witness key file does not exist: $WITNESS_KEY_PATH"
              exit 1
            fi
            WITNESS_ARGS+=(--signer-file-key-path "$WITNESS_KEY_PATH")
          elif [ "$ENABLE_SIGSTORE" = "true" ]; then
            SHOULD_WITNESS="true"
            WITNESS_ARGS+=(
              --signer-fulcio-url=${{ .inputs.fulcio_url }}
              --timestamp-servers=https://timestamp.sigstore.dev/api/v1/timestamp
            )
            if [ -f ".fulcio-token" ]; then
              WITNESS_ARGS+=(--signer-fulcio-token "$(cat .fulcio-token)")
            fi
          fi
          if [ -n "$WITNESS_WORKINGDIR" ]; then
            WITNESS_ARGS+=(--workingdir "$WITNESS_WORKINGDIR")
          fi

          if [ "$SHOULD_WITNESS" = "true" ]; then
            uds run setup:witness --no-progress
            witness run "${WITNESS_ARGS[@]}" -s=gitleaks --outfile="$GITLEAKS_WITNESS" -- "${GITLEAKS_CMD[@]}"
          else
            echo "Sigstore disabled. Running Gitleaks without Witness attestation."
            "${GITLEAKS_CMD[@]}"
          fi

  - name: opengrep
    description: Run OpenGrep SAST scan with Witness attestation (Linux x86_64 only)
    inputs:
      opengrep_version:
        description: OpenGrep version to install
        default: v1.19.0
      opengrep_scan_path:
        description: Path to scan with OpenGrep
        default: .
      witness_key_path:
        description: Path to a local signing key for Witness. Leave empty to sign via the configured fulcio_url.
        default: ""
      witness_workingdir:
        description: Directory for Witness to run the attested command from. Use the caller repository workspace in composite actions so the git attestor sees a real checkout.
        default: ""
      enable_sigstore:
        description: Sign the attestation with Fulcio. Set to false to skip Witness attestation entirely.
        default: "true"
      fulcio_url:
        description: Fulcio instance URL for keyless Witness signing. Defaults to the production CAT Fulcio; override per environment, e.g. https://fulcio.uds.run for staging.
        default: https://fulcio.uds-mil.us
      opengrep_excludes:
        description: Comma-separated list of paths to exclude from the OpenGrep scan. Uses gitignore glob syntax. Defaults to .fulcio-token to prevent the Sigstore token from appearing in SARIF findings.
        default: .fulcio-token
    actions:
      - description: Install OpenGrep
        task: install-opengrep
        with:
          version: ${{ .inputs.opengrep_version }}

      - description: Install tools and run attested OpenGrep scan
        shell:
          linux: bash
          darwin: bash
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          OS="$(uname -s)"
          ARCH="$(uname -m)"
          if [ "$OS" != "Linux" ] || [ "$ARCH" != "x86_64" ]; then
            echo "OpenGrep is only available for Linux x86_64; skipping on ${OS}/${ARCH}"
            exit 0
          fi

          OPENGREP_SCAN_PATH="${{ .inputs.opengrep_scan_path }}"
          OPENGREP_EXCLUDES="${{ .inputs.opengrep_excludes }}"
          WITNESS_KEY_PATH="${{ .inputs.witness_key_path }}"
          WITNESS_WORKINGDIR="${{ .inputs.witness_workingdir }}"
          ENABLE_SIGSTORE="${{ .inputs.enable_sigstore }}"
          OUTPUT_DIR="$(pwd)"
          OPENGREP_SARIF="${OUTPUT_DIR}/opengrep.sarif.json"
          OPENGREP_WITNESS="${OUTPUT_DIR}/opengrep-witness.json"

          # Base OpenGrep Command
          OPENGREP_CMD=(opengrep scan "$OPENGREP_SCAN_PATH" --sarif-output "$OPENGREP_SARIF")
          if [ -n "$OPENGREP_EXCLUDES" ]; then
            IFS=',' read -ra EXCLUDE_LIST <<< "$OPENGREP_EXCLUDES"
            for excl in "${EXCLUDE_LIST[@]}"; do
              excl="${excl#"${excl%%[![:space:]]*}"}"  # trim leading whitespace
              excl="${excl%"${excl##*[![:space:]]}"}"  # trim trailing whitespace
              [ -n "$excl" ] && OPENGREP_CMD+=(--exclude "$excl")
            done
          fi
          rm -f "$OPENGREP_WITNESS"

          WITNESS_ARGS=(-a=environment -a=git)
          SHOULD_WITNESS="false"

          if [ -n "$WITNESS_KEY_PATH" ]; then
            SHOULD_WITNESS="true"
            if [ ! -f "$WITNESS_KEY_PATH" ]; then
              echo "Witness key file does not exist: $WITNESS_KEY_PATH"
              exit 1
            fi
            WITNESS_ARGS+=(--signer-file-key-path "$WITNESS_KEY_PATH")
          elif [ "$ENABLE_SIGSTORE" = "true" ]; then
            SHOULD_WITNESS="true"
            WITNESS_ARGS+=(
              --signer-fulcio-url=${{ .inputs.fulcio_url }}
              --timestamp-servers=https://timestamp.sigstore.dev/api/v1/timestamp
            )
            if [ -f ".fulcio-token" ]; then
              WITNESS_ARGS+=(--signer-fulcio-token "$(cat .fulcio-token)")
            fi
          fi
          if [ -n "$WITNESS_WORKINGDIR" ]; then
            WITNESS_ARGS+=(--workingdir "$WITNESS_WORKINGDIR")
          fi

          if [ "$SHOULD_WITNESS" = "true" ]; then
            uds run setup:witness --no-progress
            witness run "${WITNESS_ARGS[@]}" -s=opengrep --outfile="$OPENGREP_WITNESS" -- "${OPENGREP_CMD[@]}"
          else
            echo "Sigstore disabled. Running OpenGrep without Witness attestation."
            "${OPENGREP_CMD[@]}"
          fi

  - name: security
    description: Run Gitleaks and OpenGrep security scans with Witness attestation
    inputs:
      gitleaks_version:
        description: Gitleaks version to install
        default: 8.30.1
      gitleaks_scan_path:
        description: Directory for Gitleaks to scan.
        default: .
      opengrep_version:
        description: OpenGrep version to install.
        default: v1.19.0
      opengrep_scan_path:
        description: Path to scan with OpenGrep.
        default: .
      witness_key_path:
        description: Path to a local signing key for Witness.
        default: ""
      witness_workingdir:
        description: Directory for Witness to run the attested command from.
        default: ""
      enable_sigstore:
        description: Sign attestations with Fulcio. Set to false to skip Witness attestation entirely.
        default: "true"
      fulcio_url:
        description: Fulcio instance URL for keyless Witness signing, passed through to gitleaks/opengrep. Defaults to the production CAT Fulcio; override per environment, e.g. https://fulcio.uds.run for staging.
        default: https://fulcio.uds-mil.us
      enable_archivista:
        description: Upload attestations to Archivista.
        default: "false"
      run_opengrep:
        description: Whether to run OpenGrep SAST. Set to false to skip.
        default: "true"
      opengrep_excludes:
        description: Comma-separated list of paths to exclude from the OpenGrep scan. Uses gitignore glob syntax. Defaults to .fulcio-token to prevent the Sigstore token from appearing in SARIF findings.
        default: .fulcio-token
    actions:
      - description: Run Gitleaks with Witness attestation
        task: gitleaks
        with:
          gitleaks_version: ${{ .inputs.gitleaks_version }}
          gitleaks_scan_path: ${{ .inputs.gitleaks_scan_path }}
          witness_key_path: ${{ .inputs.witness_key_path }}
          witness_workingdir: ${{ .inputs.witness_workingdir }}
          enable_sigstore: ${{ .inputs.enable_sigstore }}
          fulcio_url: ${{ .inputs.fulcio_url }}

      - description: Run OpenGrep with Witness attestation
        task: opengrep
        if: ${{ eq .inputs.run_opengrep "true" }}
        with:
          opengrep_version: ${{ .inputs.opengrep_version }}
          opengrep_scan_path: ${{ .inputs.opengrep_scan_path }}
          witness_key_path: ${{ .inputs.witness_key_path }}
          witness_workingdir: ${{ .inputs.witness_workingdir }}
          enable_sigstore: ${{ .inputs.enable_sigstore }}
          fulcio_url: ${{ .inputs.fulcio_url }}
          opengrep_excludes: ${{ .inputs.opengrep_excludes }}

      - description: Report security scan completion
        cmd: echo "==> Security scan complete"
