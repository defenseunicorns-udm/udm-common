# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/maru-runner/refs/heads/main/tasks.schema.json

tasks:

  - name: package
    description: Vouch for a signed Zarf package via OLM, pushing attestations to CAT
    inputs:
      zarf_package:
        description: Path to the Zarf package .tar.zst to vouch. If unset, uses the most recent zarf-package-*.tar.zst in the current directory.
        default: ""
      attestations:
        description: Comma-separated list of Witness JSON attestation files to include
        default: ""
      sarif_files:
        description: Comma-separated list of SARIF files to include as evidence
        default: ""
      olm_cat:
        description: Domain of the CAT instance
        default: ""
      olm_org:
        description: OLM organization name
        default: ""
      olm_identity_token:
        description: OIDC identity token for OLM CAT authentication. In GitLab CI, set via id_tokens with aud=cat and pass $OLM_ID_TOKEN. Leave empty for interactive device flow (local use).
        default: ""
      test_directory:
        description: Path to the test directory to pass to olm vouch. Leave empty to skip.
        default: tests
      cosign_repository:
        description: Cosign signature repository for OLM lookup. Defaults to registry.uds-mil.us/<olm_org>/signatures.
        default: ""
    actions:
      - description: Vouch for Zarf package via OLM
        shell:
          linux: bash
          darwin: bash
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          ATTESTATIONS="${{ .inputs.attestations }}"
          SARIF_FILES="${{ .inputs.sarif_files }}"
          TEST_DIRECTORY="${{ .inputs.test_directory }}"
          OLM_CAT="${{ .inputs.olm_cat }}"
          OLM_ORG="${{ .inputs.olm_org }}"
          COSIGN_REPOSITORY="${{ .inputs.cosign_repository }}"

          PACKAGE="${{ .inputs.zarf_package }}"
          if [ -z "$PACKAGE" ]; then
            while IFS= read -r p; do
              if [ -z "$PACKAGE" ] || [ "$p" -nt "$PACKAGE" ]; then
                PACKAGE="$p"
              fi
            done < <(find . -maxdepth 1 -name "zarf-package-*.tar.zst" -type f)
          fi
          if [ -z "$PACKAGE" ]; then
            echo "No zarf-package-*.tar.zst file found."
            exit 1
          fi
          if [ ! -f "$PACKAGE" ]; then
            echo "Zarf package not found: $PACKAGE"
            exit 1
          fi

          if [ -z "$OLM_CAT" ]; then
            echo "No OLM_CAT configured. Skipping OLM vouch for local run."
            exit 0
          fi

          ATTESTATION_FILES=()
          if [ -n "$ATTESTATIONS" ]; then
            IFS=',' read -ra PROVIDED_ATTESTATIONS <<< "$ATTESTATIONS"
            for attestation in "${PROVIDED_ATTESTATIONS[@]}"; do
              attestation="${attestation#"${attestation%%[![:space:]]*}"}"
              attestation="${attestation%"${attestation##*[![:space:]]}"}"
              if [ -z "$attestation" ]; then
                continue
              fi
              if [ -s "$attestation" ]; then
                ATTESTATION_FILES+=("$attestation")
              else
                echo "Skipping missing attestation file: $attestation"
              fi
            done
          fi

          SARIF_EVIDENCE_FILES=()
          if [ -n "$SARIF_FILES" ]; then
            IFS=',' read -ra PROVIDED_SARIF_FILES <<< "$SARIF_FILES"
            for sarif_file in "${PROVIDED_SARIF_FILES[@]}"; do
              sarif_file="${sarif_file#"${sarif_file%%[![:space:]]*}"}"
              sarif_file="${sarif_file%"${sarif_file##*[![:space:]]}"}"
              if [ -z "$sarif_file" ]; then
                continue
              fi
              if [ -s "$sarif_file" ]; then
                SARIF_EVIDENCE_FILES+=("$sarif_file")
              else
                echo "Skipping missing SARIF file: $sarif_file"
              fi
            done
          fi

          OLM_IDENTITY_TOKEN="${{ .inputs.olm_identity_token }}"

          OLM_ARGS=()
          if [ -n "$OLM_CAT" ]; then
            OLM_ARGS+=(--cat "$OLM_CAT")
          fi
          if [ -n "$OLM_IDENTITY_TOKEN" ]; then
            OLM_ARGS+=(--identity-token "$OLM_IDENTITY_TOKEN")
          fi
          if [ -n "$OLM_ORG" ]; then
            OLM_ARGS+=(--org "$OLM_ORG")
          fi
          if [ "${#SARIF_EVIDENCE_FILES[@]}" -gt 0 ]; then
            ALL_SARIF_EVIDENCE=$(IFS=,; echo "${SARIF_EVIDENCE_FILES[*]}")
            OLM_ARGS+=(--sarif-evidence "$ALL_SARIF_EVIDENCE")
          fi
          if [ -n "$TEST_DIRECTORY" ] && [ -d "$TEST_DIRECTORY" ]; then
            OLM_ARGS+=(--test-directory "$TEST_DIRECTORY")
          fi
          if [ "${#ATTESTATION_FILES[@]}" -gt 0 ]; then
            ALL_ATTESTATIONS=$(IFS=,; echo "${ATTESTATION_FILES[*]}")
            OLM_ARGS+=(--attestations "$ALL_ATTESTATIONS")
          else
            echo "No Witness attestations provided; running OLM vouch without --attestations."
          fi
          if [ -z "$COSIGN_REPOSITORY" ]; then
            COSIGN_REPOSITORY="registry.uds-mil.us/signatures"
            if [ -n "$OLM_ORG" ]; then
              COSIGN_REPOSITORY="registry.uds-mil.us/${OLM_ORG}/signatures"
            fi
          fi
          OLM_ARGS+=(--cosign-repository "$COSIGN_REPOSITORY")
          echo "====== Running OLM vouch $(./olm version) ======"
          ./olm vouch "$PACKAGE" \
            "${OLM_ARGS[@]}" \
            --log-level debug
