# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/maru-runner/refs/heads/main/tasks.schema.json

tasks:

  - name: package
    description: Build and sign a Zarf package, or use an existing signed package, then vouch for it via OLM
    inputs:
      attestations:
        description: Comma-separated list of additional witness JSON attestation files to include
        default: ""
      sarif_files:
        description: Comma-separated list of SARIF files to include as evidence
        default: ""
      olm_cat:
        description: Domain of the CAT instance
        default: ""
      olm_org:
        description: OLM organization name
        default: ""
      github_token:
        description: GitHub token for GHCR authentication. Pass secrets.GITHUB_TOKEN in CI. Leave empty locally — the package is publicly accessible.
        default: ""
      zarf_path:
        description: Path to the directory containing zarf.yaml
        default: .
      architecture:
        description: Target architecture for the Zarf package
        default: amd64
      zarf_flavor:
        description: Optional flavor to pass to zarf package create. If not set, no flavor will be used.
        required: false
        default: ""
      test_directory:
        description: Path to the test directory to pass to olm vouch. Leave empty to skip.
        default: tests
      witness_key_path:
        description: Path to a local signing key for Witness. Use for local runs without OIDC. Leave empty in CI (Sigstore is used instead).
        default: ""
      witness_workingdir:
        description: Directory for Witness to run the attested command from. Use the caller repository workspace in composite actions so the git attestor sees a real checkout.
        default: ""
      enable_archivista:
        description: Upload the build attestation to Archivista.
        default: "false"
      fulcio_oidc_issuer:
        description: OIDC issuer URL for Sigstore/Fulcio signing. Override for non-GitHub CI providers (e.g. https://gitlab.com).
        default: https://token.actions.githubusercontent.com
      build_command:
        description: Optional. Custom build command to run under Witness attestation instead of the default 'uds zarf package create'. When set, zarf_path and architecture inputs are ignored.
        default: ""
      olm_identity_token:
        description: OIDC identity token for OLM CAT authentication. In GitLab CI, set via id_tokens with aud=cat and pass $OLM_ID_TOKEN. Leave empty for interactive device flow (local use).
        default: ""
      cosign_key_path:
        description: Path to cosign private key file for signing container images and helm charts before attestation. Leave empty for keyless Sigstore signing.
        default: ""
      sign_artifacts:
        description: Sign package artifacts before OLM vouch. Set to false when artifacts are already signed elsewhere.
        default: "true"
      cosign_repository:
        description: Optional cosign signature repository for OLM lookup. Defaults to registry.uds-mil.us/<olm_org>/signatures.
        default: ""
      registry_user_id:
        description: Registry username for pushing cosign signatures.
        default: ""
      registry_password:
        description: Registry password for pushing cosign signatures.
        default: ""
    actions:
      - description: Install tools, prepare Zarf package, and vouch
        shell:
          linux: bash
          darwin: bash
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          ATTESTATIONS="${{ .inputs.attestations }}"
          SARIF_FILES="${{ .inputs.sarif_files }}"
          TEST_DIRECTORY="${{ .inputs.test_directory }}"
          OLM_CAT="${{ .inputs.olm_cat }}"
          OLM_ORG="${{ .inputs.olm_org }}"
          ZARF_FLAVOR="${{ .inputs.zarf_flavor }}"
          SIGN_ARTIFACTS="${{ .inputs.sign_artifacts }}"
          COSIGN_REPOSITORY="${{ .inputs.cosign_repository }}"
          REGISTRY_USER_ID="${{ .inputs.registry_user_id }}"
          REGISTRY_PASSWORD="${{ .inputs.registry_password }}"

          BUILD_ARGS=(
            --with zarf_path="${{ .inputs.zarf_path }}"
            --with architecture="${{ .inputs.architecture }}"
            --with witness_key_path="${{ .inputs.witness_key_path }}"
            --with witness_workingdir="${{ .inputs.witness_workingdir }}"
            --with enable_archivista="${{ .inputs.enable_archivista }}"
            --with fulcio_oidc_issuer="${{ .inputs.fulcio_oidc_issuer }}"
            --with build_command="${{ .inputs.build_command }}"
          )
          if [ -n "$ZARF_FLAVOR" ]; then
            BUILD_ARGS+=(--with zarf_flavor="$ZARF_FLAVOR")
          fi
          echo "====== Running build with arguments: ${BUILD_ARGS[*]} ======"
          uds run build:zarf-package "${BUILD_ARGS[@]}"

          PACKAGE=""
          while IFS= read -r package; do
            if [ -z "$PACKAGE" ] || [ "$package" -nt "$PACKAGE" ]; then
              PACKAGE="$package"
            fi
          done < <(find . -maxdepth 1 -name "zarf-package-*.tar.zst" -type f)
          if [ -z "$PACKAGE" ]; then
            echo "No zarf-package-*.tar.zst file found after build."
            exit 1
          fi

          if [ -z "$OLM_CAT" ]; then
            echo "No OLM_CAT configured. Skipping OLM vouch for local run."
            exit 0
          fi

          # uds run olm:setup \
          #   --with github_token="${{ .inputs.github_token }}"

          if [ "$SIGN_ARTIFACTS" = "true" ]; then
            uds run sign:artifacts \
              --with zarf_package="$PACKAGE" \
              --with registry_org="$OLM_ORG" \
              --with registry_user_id="$REGISTRY_USER_ID" \
              --with registry_password="$REGISTRY_PASSWORD" \
              --with cosign_key_path="${{ .inputs.cosign_key_path }}"
          else
            echo "Skipping artifact signing; using existing signatures for $PACKAGE."
          fi

          ATTESTATION_FILES=()
          if [ -s zarf-create-witness.json ]; then
            ATTESTATION_FILES+=(zarf-create-witness.json)
          fi

          if [ -n "$ATTESTATIONS" ]; then
            IFS=',' read -ra PROVIDED_ATTESTATIONS <<< "$ATTESTATIONS"
            for attestation in "${PROVIDED_ATTESTATIONS[@]}"; do
              attestation="${attestation#"${attestation%%[![:space:]]*}"}"
              attestation="${attestation%"${attestation##*[![:space:]]}"}"
              if [ -z "$attestation" ]; then
                continue
              fi
              if [ -s "$attestation" ]; then
                ATTESTATION_FILES+=("$attestation")
              else
                echo "Skipping missing attestation file: $attestation"
              fi
            done
          fi

          SARIF_EVIDENCE_FILES=()
          if [ -n "$SARIF_FILES" ]; then
            IFS=',' read -ra PROVIDED_SARIF_FILES <<< "$SARIF_FILES"
            for sarif_file in "${PROVIDED_SARIF_FILES[@]}"; do
              sarif_file="${sarif_file#"${sarif_file%%[![:space:]]*}"}"
              sarif_file="${sarif_file%"${sarif_file##*[![:space:]]}"}"
              if [ -z "$sarif_file" ]; then
                continue
              fi
              if [ -s "$sarif_file" ]; then
                SARIF_EVIDENCE_FILES+=("$sarif_file")
              else
                echo "Skipping missing SARIF file: $sarif_file"
              fi
            done
          fi

          OLM_IDENTITY_TOKEN="${{ .inputs.olm_identity_token }}"

          OLM_ARGS=()
          if [ -n "$OLM_CAT" ]; then
            OLM_ARGS+=(--cat "$OLM_CAT")
          fi
          if [ -n "$OLM_IDENTITY_TOKEN" ]; then
            OLM_ARGS+=(--identity-token "$OLM_IDENTITY_TOKEN")
          fi
          if [ -n "$OLM_ORG" ]; then
            OLM_ARGS+=(--org "$OLM_ORG")
          fi
          if [ "${#SARIF_EVIDENCE_FILES[@]}" -gt 0 ]; then
            ALL_SARIF_EVIDENCE=$(IFS=,; echo "${SARIF_EVIDENCE_FILES[*]}")
            OLM_ARGS+=(--sarif-evidence "$ALL_SARIF_EVIDENCE")
          fi
          if [ -n "$TEST_DIRECTORY" ] && [ -d "$TEST_DIRECTORY" ]; then
            OLM_ARGS+=(--test-directory "$TEST_DIRECTORY")
          fi
          if [ "${#ATTESTATION_FILES[@]}" -gt 0 ]; then
            ALL_ATTESTATIONS=$(IFS=,; echo "${ATTESTATION_FILES[*]}")
            OLM_ARGS+=(--attestations "$ALL_ATTESTATIONS")
          else
            echo "No Witness attestations were produced or provided; running OLM vouch without --attestations."
          fi
          if [ -z "$COSIGN_REPOSITORY" ]; then
            COSIGN_REPOSITORY="registry.uds-mil.us/signatures"
            if [ -n "$OLM_ORG" ]; then
              COSIGN_REPOSITORY="registry.uds-mil.us/${OLM_ORG}/signatures"
            fi
          fi
          OLM_ARGS+=(--cosign-repository "$COSIGN_REPOSITORY")
          echo "====== Running OLM build $(./olm version) ======"
          ./olm vouch "$PACKAGE" \
            "${OLM_ARGS[@]}" \
            --log-level debug
