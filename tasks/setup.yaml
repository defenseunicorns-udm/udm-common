# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/maru-runner/refs/heads/main/tasks.schema.json

tasks:

  - name: uds-cli
    description: Download and install UDS CLI to $HOME/.local/bin
    inputs:
      version:
        description: Version of UDS CLI to install
        # renovate: datasource=github-releases depName=defenseunicorns/uds-cli
        default: v0.30.3
    actions:
      - description: Install UDS CLI
        shell:
          linux: bash
          darwin: bash
        cmd: |
          VERSION=${{ .inputs.version }}
          OS="$(uname -s)"
          ARCH="$(uname -m)"

          case "$OS" in
            Linux)
              case "$ARCH" in
                x86_64)  BINARY="uds-cli_${VERSION}_Linux_amd64" ;;
                aarch64) BINARY="uds-cli_${VERSION}_Linux_arm64" ;;
                *) echo "Unsupported architecture: $ARCH"; exit 1 ;;
              esac
              ;;
            Darwin)
              case "$ARCH" in
                x86_64) BINARY="uds-cli_${VERSION}_Darwin_amd64" ;;
                arm64)  BINARY="uds-cli_${VERSION}_Darwin_arm64" ;;
                *) echo "Unsupported architecture: $ARCH"; exit 1 ;;
              esac
              ;;
            *) echo "Unsupported OS: $OS"; exit 1 ;;
          esac

          mkdir -p "$HOME/.local/bin"
          curl --retry-all-errors --retry 5 -fSL \
            "https://github.com/defenseunicorns/uds-cli/releases/download/${VERSION}/${BINARY}" \
            -o "$HOME/.local/bin/uds"
          chmod +x "$HOME/.local/bin/uds"
          echo "UDS CLI ${VERSION} installed to \$HOME/.local/bin/uds"
          echo "Ensure \$HOME/.local/bin is on your PATH."
