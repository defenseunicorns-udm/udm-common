# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/maru-runner/refs/heads/main/tasks.schema.json

tasks:

  - name: install-scorecard
    description: Download and install OpenSSF Scorecard to $HOME/.local/bin
    inputs:
      version:
        description: Scorecard version to install (no v prefix)
        # renovate: datasource=github-releases depName=ossf/scorecard extractVersion=^v(?<version>.+)$
        default: 5.5.0
    actions:
      - description: Install Scorecard
        shell:
          linux: bash
          darwin: bash
        cmd: |
          get_os() {
            case "$(uname -s)" in
              Linux)  echo "linux" ;;
              Darwin) echo "darwin" ;;
              *) echo "Unsupported OS: $(uname -s)" >&2; return 1 ;;
            esac
          }
          get_arch() {
            case "$(uname -m)" in
              x86_64)        echo "amd64" ;;
              aarch64|arm64) echo "arm64" ;;
              *) echo "Unsupported architecture: $(uname -m)" >&2; return 1 ;;
            esac
          }
          install_from_tarball() {
            local name="$1" url="$2" inner="${3:-$1}"
            local tmp
            tmp="$(mktemp -d)"
            # shellcheck disable=SC2064
            trap "rm -rf '$tmp'" RETURN
            curl -fSL "$url" | tar -xz -C "$tmp" "$inner"
            mkdir -p "$HOME/.local/bin"
            mv "$tmp/$inner" "$HOME/.local/bin/$name"
            chmod +x "$HOME/.local/bin/$name"
            echo "$name installed to $HOME/.local/bin/$name"
          }
          VERSION="${{ .inputs.version }}"
          OS="$(get_os)"
          ARCH="$(get_arch)"
          install_from_tarball scorecard \
            "https://github.com/ossf/scorecard/releases/download/v${VERSION}/scorecard_${VERSION}_${OS}_${ARCH}.tar.gz" \
            scorecard

  - name: run
    description: Run OpenSSF Scorecard with Witness attestation, producing SARIF
    inputs:
      scorecard_version:
        description: Scorecard version to install (no v prefix)
        default: 5.5.0
      scorecard_repo:
        description: Remote repository to analyze via the host API, e.g. github.com/org/repo. When set, Scorecard runs in remote mode and uses scorecard_token. Leave empty to analyze the local checkout instead.
        default: ""
      scorecard_local_path:
        description: Path to the local checkout to analyze when scorecard_repo is empty. Local mode runs a reduced set of checks (no API-based signals).
        default: .
      scorecard_token:
        description: GitHub/GitLab API token for remote mode. Exported as GITHUB_AUTH_TOKEN. In CI pass secrets.GITHUB_TOKEN. Ignored in local mode.
        default: ""
      witness_key_path:
        description: Path to a local signing key for Witness. Leave empty to sign via the configured fulcio_url.
        default: ""
      witness_workingdir:
        description: Directory for Witness to run the attested command from. Use the caller repository workspace in composite actions so the git attestor sees a real checkout.
        default: ""
      enable_sigstore:
        description: Sign the attestation with Fulcio. Set to false to skip Witness attestation entirely.
        default: "true"
      fulcio_url:
        description: Fulcio instance URL for keyless Witness signing. Defaults to the production CAT Fulcio; override per environment, e.g. https://fulcio.uds.run for staging.
        default: https://fulcio.uds-mil.us
    actions:
      - description: Install Scorecard and run an attested supply-chain analysis
        shell:
          linux: bash
          darwin: bash
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          SCORECARD_REPO="${{ .inputs.scorecard_repo }}"
          SCORECARD_LOCAL_PATH="${{ .inputs.scorecard_local_path }}"
          SCORECARD_TOKEN="${{ .inputs.scorecard_token }}"
          WITNESS_KEY_PATH="${{ .inputs.witness_key_path }}"
          WITNESS_WORKINGDIR="${{ .inputs.witness_workingdir }}"
          ENABLE_SIGSTORE="${{ .inputs.enable_sigstore }}"
          OUTPUT_DIR="$(pwd)"
          SCORECARD_SARIF="${OUTPUT_DIR}/scorecard.sarif.json"
          SCORECARD_WITNESS="${OUTPUT_DIR}/scorecard-witness.json"

          uds run scorecard:install-scorecard --with version="${{ .inputs.scorecard_version }}"

          # Remote mode (--repo) queries the host API for full check coverage and
          # needs a token. Local mode (--local) analyzes the checkout with a
          # reduced set of checks and needs no token.
          if [ -n "$SCORECARD_REPO" ]; then
            if [ -n "$SCORECARD_TOKEN" ]; then
              export GITHUB_AUTH_TOKEN="$SCORECARD_TOKEN"
            fi
            SCORECARD_TARGET="--repo=$SCORECARD_REPO"
          else
            SCORECARD_TARGET="--local $SCORECARD_LOCAL_PATH"
          fi

          # Scorecard emits SARIF to stdout, so wrap the redirection in bash -c
          # to keep it inside the command Witness attests.
          SCORECARD_CMD=(bash -c "scorecard $SCORECARD_TARGET --format=sarif > \"$SCORECARD_SARIF\"")
          rm -f "$SCORECARD_WITNESS"

          WITNESS_ARGS=(-a=environment -a=git)
          SHOULD_WITNESS="false"

          if [ -n "$WITNESS_KEY_PATH" ]; then
            SHOULD_WITNESS="true"
            if [ ! -f "$WITNESS_KEY_PATH" ]; then
              echo "Witness key file does not exist: $WITNESS_KEY_PATH"
              exit 1
            fi
            WITNESS_ARGS+=(--signer-file-key-path "$WITNESS_KEY_PATH")
          elif [ "$ENABLE_SIGSTORE" = "true" ]; then
            SHOULD_WITNESS="true"
            WITNESS_ARGS+=(
              --signer-fulcio-url=${{ .inputs.fulcio_url }}
              --timestamp-servers=https://timestamp.sigstore.dev/api/v1/timestamp
            )
            if [ -f ".fulcio-token" ]; then
              WITNESS_ARGS+=(--signer-fulcio-token "$(cat .fulcio-token)")
            fi
          fi
          if [ -n "$WITNESS_WORKINGDIR" ]; then
            WITNESS_ARGS+=(--workingdir "$WITNESS_WORKINGDIR")
          fi

          if [ "$SHOULD_WITNESS" = "true" ]; then
            uds run setup:witness
            witness run "${WITNESS_ARGS[@]}" -s=scorecard --outfile="$SCORECARD_WITNESS" -- "${SCORECARD_CMD[@]}"
          else
            echo "Sigstore disabled. Running Scorecard without Witness attestation."
            "${SCORECARD_CMD[@]}"
          fi
