# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/maru-runner/refs/heads/main/tasks.schema.json

tasks:

  - name: setup
    description: Authenticate with the OLM registry and install the OLM CLI
    inputs:
      registry_url:
        description: URL of the registry to authenticate against
        default: registry.uds-mil.us
      version:
        description: Version of OLM CLI to install
        # renovate: datasource=github-releases depName=defenseunicorns/uds-dot-mil extractVersion=^olm-(?<version>.+)$
        default: 0.1.18
      username:
        description: Username for registry authentication
        default: ""
      password:
        description: Password for registry authentication
        default: ""
    actions:
      - description: Authenticate and install OLM CLI
        shell:
          linux: bash
          darwin: bash
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          uds zarf tools registry login \
            -u "${{ .inputs.username }}" \
            -p "${{ .inputs.password }}" \
            "${{ .inputs.registry_url }}"

          uds zarf package deploy \
            "oci://${{ .inputs.registry_url }}/defenseunicorns/olm-installer:${{ .inputs.version }}-linux" \
            -a amd64 --confirm

          chmod +x olm
