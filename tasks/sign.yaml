# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/maru-runner/refs/heads/main/tasks.schema.json

tasks:

  - name: artifacts
    description: Sign container images and OCI helm charts from a Zarf package with cosign, pushing signatures to a target registry
    inputs:
      zarf_package:
        description: Path to the Zarf package .tar.zst to sign artifacts from
        required: true
      registry:
        description: OCI registry to push cosign signatures to
        default: registry.uds-mil.us
      registry_org:
        description: Organization path within the registry for signature storage (e.g. my-org)
        default: ""
      registry_user_id:
        description: Registry username for cosign login. Leave empty for unauthenticated access.
        default: ""
      registry_password:
        description: Registry password for cosign login.
        default: ""
      cosign_key_path:
        description: Path to cosign private key file. Leave empty to use keyless Sigstore signing (requires OIDC token in CI).
        default: ""
    actions:
      # - task: setup:cosign
      - description: Sign container images and OCI helm charts from the Zarf package
        shell:
          linux: bash
          darwin: bash
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          COSIGN_KEY_PATH="${{ .inputs.cosign_key_path }}"
          PACKAGE="${{ .inputs.zarf_package }}"
          REGISTRY="${{ .inputs.registry }}"
          REGISTRY_ORG="${{ .inputs.registry_org }}"
          REGISTRY_USER_ID="${{ .inputs.registry_user_id }}"
          REGISTRY_PASSWORD="${{ .inputs.registry_password }}"

          if [ -n "$REGISTRY_USER_ID" ] && [ -n "$REGISTRY_PASSWORD" ]; then
            cosign login "$REGISTRY" -u "$REGISTRY_USER_ID" -p "$REGISTRY_PASSWORD"
          fi

          # Signatures are pushed to the target registry rather than the source
          # registry of each image, since we typically lack write access to those.
          SIG_REPO="$REGISTRY"
          if [ -n "$REGISTRY_ORG" ]; then
            SIG_REPO="${SIG_REPO}/${REGISTRY_ORG}"
          fi
          SIG_REPO="${SIG_REPO}/signatures"
          export COSIGN_REPOSITORY="$SIG_REPO"

          # Zarf packages are zstd-compressed tarballs; extract zarf.yaml and OCI index.
          ZARF_YAML=$(zstd -d --stdout "$PACKAGE" 2>/dev/null | tar -xO zarf.yaml 2>/dev/null)
          INDEX_JSON=$(zstd -d --stdout "$PACKAGE" 2>/dev/null | tar -xO images/index.json 2>/dev/null || true)
          IMAGES=$(printf '%s' "$ZARF_YAML" \
            | uds zarf tools yq '.components[].images[]' 2>/dev/null \
            | grep -v '^$' | grep -v '^null$' | sort -u || true)

          OCI_CHARTS=$(printf '%s' "$ZARF_YAML" \
            | uds zarf tools yq \
              '.components[].charts[] | select(.url | test("^oci://")) | (.url | ltrimstr("oci://")) + ":" + .version' \
              2>/dev/null \
            | grep -v '^$' | grep -v '^null$' | sort -u || true)

          COSIGN_SIGN_ARGS=(--yes)
          if [ -n "$COSIGN_KEY_PATH" ]; then
            COSIGN_SIGN_ARGS+=(--key "$COSIGN_KEY_PATH")
          fi

          SIGNED=0

          if [ -n "$IMAGES" ]; then
            while IFS= read -r image; do
              [ -z "$image" ] && continue
              # Look up the exact digest from the OCI layout so signing and verification
              # use the same digest (avoids manifest-list vs. platform-manifest mismatch).
              DIGEST=""
              if [ -n "$INDEX_JSON" ]; then
                DIGEST=$(printf '%s' "$INDEX_JSON" \
                  | uds zarf tools yq '.manifests[] | select(.annotations["org.opencontainers.image.ref.name"] | test("'"$image"'$")) | .digest' \
                  2>/dev/null | grep -v '^$' | grep -v '^null$' | head -1 || true)
              fi
              if [ -n "$DIGEST" ]; then
                SIGN_REF="${image}@${DIGEST}"
              else
                SIGN_REF="$image"
              fi
              echo "Signing image: $SIGN_REF"
              cosign sign "${COSIGN_SIGN_ARGS[@]}" "$SIGN_REF"
              SIGNED=$((SIGNED + 1))
            done <<< "$IMAGES"
          fi

          if [ -n "$OCI_CHARTS" ]; then
            while IFS= read -r chart; do
              [ -z "$chart" ] && continue
              echo "Signing helm chart: $chart"
              cosign sign "${COSIGN_SIGN_ARGS[@]}" "$chart"
              SIGNED=$((SIGNED + 1))
            done <<< "$OCI_CHARTS"
          fi

          echo "Signed ${SIGNED} artifact(s); signatures stored at ${SIG_REPO}."
