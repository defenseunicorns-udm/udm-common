# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/maru-runner/refs/heads/main/tasks.schema.json

includes:
  - setup: ./tasks/setup.yaml
  - scan: ./tasks/scan.yaml
  - scorecard: ./tasks/scorecard.yaml
  - ossinsight: ./tasks/ossinsight.yaml
  - build: ./tasks/build.yaml
  - olm: ./tasks/olm.yaml
  - vouch: ./tasks/vouch.yaml
  - publish: ./tasks/publish.yaml
  - attest: ./tasks/attest.yaml

tasks:

  # - name: lint
  #   description: Lint YAML files in .github/, src/, and values/ with yamllint
  #   actions:
  #     - cmd: pip install --quiet yamllint && yamllint .github/ src/ values/
  - name: lint
    description: Run all linting commands
    actions:
      - task: yaml
      - task: shell
      - task: tasks

  - name: yaml
    description: Run YAML linting checks
    actions:
      # requires yamllint to be installed either from pip or brew
      - description: Lint YAML files
        cmd: yamllint . -c .yamllint --no-warnings

  - name: shell
    description: Run shellcheck on all Maru tasks, GitHub workflows, and local shell scripts
    inputs:
      task_globs:
        description: Globs to match to Maru task files in the repo
        default: tasks.yaml tasks/*.yaml
    actions:
      - description: Lint shell scripts in Maru tasks, GitHub workflows and .sh files
        shell:
          linux: bash
          darwin: bash
        cmd: |
          # These settings:
          # -x Assume files exist (since some scripts run on VMs)
          # -e SC2016 Ignore unexpanded env vars (since sometimes we want to dynamically add a var to something like .bashrc)
          # -e SC2050 Ignore if statements that are static (inputs / expressions are filtered for shellcheck to work which in some expressions makes them static)
          # -e SC2001 Ignore sed replace suggestions (${text//search/replacement} syntax doesn't support regex so this suggestion often won't work)
          # -e SC2002 Ignore rejection of `cat |` (redirection syntax is not always familiar to developers and while cat _could_ not exist that is extremely unlikely)
          # -e SC2181 Ignore rejection of $? ($? can be confusing in some circumstances but also more readable in others with more complex commands)
          export SHELLCHECK_OPTS="-x -e SC2016 -e SC2050 -e SC2001 -e SC2002 -e SC2181"

          # Function to lint scripts inside `---` delimited files
          lint_scripts() {
            local file="$1"
            local raw_scripts="$2"

            echo "Processing $file..."

            # Temporary variable to hold the current element
            current_element=""

            # Read input line by line
            while IFS= read -r line; do
                if [ "$line" = "---" ]; then
                    # If we hit '---', print the current element if not empty
                    if [ -n "$current_element" ]; then
                        echo "$current_element" | shellcheck -
                        current_element=""
                    fi
                else
                    # Otherwise, keep adding to the current element
                    current_element="$current_element$line
                    "
                fi
            done <<< "$raw_scripts"

            # Process the last element if it's not empty
            if [ -n "$current_element" ]; then
              echo "$current_element" | shellcheck -
            fi
          }

          shopt -s nullglob # if nothing matches the glob expand to nothing
          # Lint all scripts in Maru tasks
          # shellcheck disable=SC2043
          for yaml_file in ${{ .inputs.task_globs }}; do

            # Look through all of the task actions and format .cmd entries with a dynamic shebang based on .shell.linux
            yaml_query='.tasks[].actions[] | "---\n#!/bin/"+(.shell.linux // "sh")+"\n"+.cmd'

            # Query the actual YAML file for the commands
            raw_cmds=$(uds zarf tools yq -r "$yaml_query" "$yaml_file")

            # Strip any \$\{\{ \}\} templates with the word "maru-expression" for compatibility
            maru_expr_pattern=$'\x24\x7b\x7b[^}]*\x7d\x7d'
            raw_scripts=$(printf '%s' "$raw_cmds" | sed "s|$maru_expr_pattern|maru-expression|g")

            # If this file has scripts, lint them
            if [ -n "$raw_scripts" ]; then
              lint_scripts "$yaml_file" "$raw_scripts"
            fi
          done
          shopt -u nullglob #reset nullglob behavior

          # Lint all .sh files in the current directory
          echo "Processing .sh files..."
          find . -type f -name "*.sh" -exec shellcheck {} +

          shopt -s nullglob # if nothing matches the glob expand to nothing
          # Lint all scripts in GitHub workflows
          for yaml_file in .github/workflows/*.yaml; do

            # Look through all of the job steps and format .run entries with a dynamic shebang based on .shell
            yaml_query='"---\n#!/bin/"+(.shell // "sh")+"\n"+.run'

            # Query the actual YAML file for the commands
            raw_runs=$(uds zarf tools yq -r '.jobs[].steps[]' "$yaml_file" | uds zarf tools yq -r "$yaml_query")

            # Strip any \$\{\{ \}\} templates with the word "github-expression" for compatibility
            github_expr_pattern=$'\x24\x7b\x7b[^}]*\x7d\x7d'
            raw_scripts=$(printf '%s' "$raw_runs" | sed "s|$github_expr_pattern|github-expression|g")

            # If this file has scripts, lint them
            if [ -n "$raw_scripts" ]; then
              lint_scripts "$yaml_file" "$raw_scripts"
            fi
          done
          shopt -u nullglob #reset nullglob behavior
  - name: test
    description: Run integration tests for all locally executable tasks
    actions:
      - description: Test setup and scan tasks
        shell:
          linux: bash
          darwin: bash
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          echo "==> Testing setup:uds-cli"
          uds run setup:uds-cli
          test -x "$HOME/.local/bin/uds" || { echo "FAIL: setup:uds-cli did not install uds to \$HOME/.local/bin"; exit 1; }
          echo "PASS: setup:uds-cli"

          echo "==> Testing setup:cosign"
          uds run setup:cosign
          command -v cosign > /dev/null 2>&1 || { echo "FAIL: setup:cosign did not make cosign available on PATH"; exit 1; }
          echo "PASS: setup:cosign"

          echo "==> Testing setup:witness"
          uds run setup:witness
          test -x "$HOME/.local/bin/witness" || { echo "FAIL: setup:witness did not install witness to \$HOME/.local/bin"; exit 1; }
          echo "PASS: setup:witness"

          echo "==> Testing scan:install-gitleaks"
          uds run scan:install-gitleaks
          test -x "$HOME/.local/bin/gitleaks" || { echo "FAIL: scan:install-gitleaks did not install gitleaks to \$HOME/.local/bin"; exit 1; }
          echo "PASS: scan:install-gitleaks"

          echo "==> Testing scan:install-opengrep (Linux x86_64 only)"
          if [ "$(uname -s)" = "Linux" ] && [ "$(uname -m)" = "x86_64" ]; then
            uds run scan:install-opengrep
            test -x "$HOME/.local/bin/opengrep" || { echo "FAIL: scan:install-opengrep did not install opengrep to \$HOME/.local/bin"; exit 1; }
            echo "PASS: scan:install-opengrep"
          else
            echo "SKIP: scan:install-opengrep (not Linux x86_64)"
          fi

          echo "==> Testing attest:lint (ephemeral key)"
          WITNESS_TEST_KEY=$(mktemp /tmp/witness-XXXXXX.pem)
          openssl genpkey -algorithm ED25519 -out "$WITNESS_TEST_KEY" 2>/dev/null
          rm -f lint-witness.json
          uds run attest:lint \
            --with witness_key_path="$WITNESS_TEST_KEY"
          rm -f "$WITNESS_TEST_KEY"
          test -s lint-witness.json || { echo "FAIL: lint-witness.json not created or empty"; exit 1; }
          rm -f lint-witness.json
          echo "PASS: attest:lint"

          echo "==> Testing scan:security (ephemeral key)"
          WITNESS_TEST_KEY=$(mktemp /tmp/witness-XXXXXX.pem)
          openssl genpkey -algorithm ED25519 -out "$WITNESS_TEST_KEY" 2>/dev/null
          rm -f gitleaks.sarif.json gitleaks-witness.json opengrep.sarif.json opengrep-witness.json
          uds run scan:security \
            --with enable_archivista=false \
            --with witness_key_path="$WITNESS_TEST_KEY"
          rm -f "$WITNESS_TEST_KEY"
          test -s gitleaks.sarif.json || { echo "FAIL: gitleaks.sarif.json not created or empty"; exit 1; }
          test -s gitleaks-witness.json || { echo "FAIL: gitleaks-witness.json not created or empty"; exit 1; }
          echo "PASS: scan:gitleaks produced output files"
          if [ "$(uname -s)" = "Linux" ] && [ "$(uname -m)" = "x86_64" ]; then
            test -s opengrep.sarif.json || { echo "FAIL: opengrep.sarif.json not created or empty"; exit 1; }
            test -s opengrep-witness.json || { echo "FAIL: opengrep-witness.json not created or empty"; exit 1; }
            echo "PASS: scan:opengrep produced output files"
          fi
          rm -f gitleaks.sarif.json gitleaks-witness.json opengrep.sarif.json opengrep-witness.json
          echo "PASS: scan:security"

          echo "==> Testing scorecard:install-scorecard"
          uds run scorecard:install-scorecard
          test -x "$HOME/.local/bin/scorecard" || { echo "FAIL: scorecard:install-scorecard did not install scorecard to \$HOME/.local/bin"; exit 1; }
          echo "PASS: scorecard:install-scorecard"

          echo "==> Testing scorecard:run (local mode, ephemeral key)"
          WITNESS_TEST_KEY=$(mktemp /tmp/witness-XXXXXX.pem)
          openssl genpkey -algorithm ED25519 -out "$WITNESS_TEST_KEY" 2>/dev/null
          rm -f scorecard.sarif.json scorecard-witness.json
          uds run scorecard:run \
            --with witness_key_path="$WITNESS_TEST_KEY"
          rm -f "$WITNESS_TEST_KEY"
          test -s scorecard.sarif.json || { echo "FAIL: scorecard.sarif.json not created or empty"; exit 1; }
          test -s scorecard-witness.json || { echo "FAIL: scorecard-witness.json not created or empty"; exit 1; }
          rm -f scorecard.sarif.json scorecard-witness.json
          echo "PASS: scorecard:run"

          echo "==> Testing ossinsight:run (ephemeral key)"
          WITNESS_TEST_KEY=$(mktemp /tmp/witness-XXXXXX.pem)
          openssl genpkey -algorithm ED25519 -out "$WITNESS_TEST_KEY" 2>/dev/null
          rm -f ossinsight.json ossinsight-witness.json
          uds run ossinsight:run \
            --with ossinsight_owner=ossf \
            --with ossinsight_repo=scorecard \
            --with witness_key_path="$WITNESS_TEST_KEY"
          rm -f "$WITNESS_TEST_KEY"
          test -s ossinsight.json || { echo "FAIL: ossinsight.json not created or empty"; exit 1; }
          test -s ossinsight-witness.json || { echo "FAIL: ossinsight-witness.json not created or empty"; exit 1; }
          rm -f ossinsight.json ossinsight-witness.json
          echo "PASS: ossinsight:run"

          echo "All tests passed."

  - name: tasks
    description: Dry run all tasks in the base tasks file
    actions:
      - description: Dry run tasks
        cmd: |
          tasks=$(./uds run --list=md | tail -n +3 | awk -F '|' '{gsub("\\*\\*", "", $2); print $2}')

          # Loop through each command and execute with --dry-run
          for task in $tasks; do
            printf "\n\033[0;36mChecking '\033[1;33m%s\033[0;36m' with --dry-run\033[0m\n" "$task"
            uds run "$task" --dry-run
          done

  - name: scan-and-vouch
    description: Run security scans and vouch for the Zarf package
    inputs:
      gitleaks_scan_path:
        description: Directory for Gitleaks to scan
        default: .
      opengrep_scan_path:
        description: Path to scan with OpenGrep
        default: .
      run_opengrep:
        description: Whether to run OpenGrep SAST. Set to 'false' to skip.
        default: "true"
      run_scorecard:
        description: Whether to run OpenSSF Scorecard. Set to 'true' to enable.
        default: "false"
      scorecard_repo:
        description: Remote repository for Scorecard to analyze (e.g. github.com/org/repo). Leave empty to analyze the local checkout.
        default: ""
      scorecard_local_path:
        description: Path to the local checkout for Scorecard to analyze when scorecard_repo is empty.
        default: .
      scorecard_token:
        description: GitHub/GitLab API token for Scorecard remote mode. In CI pass secrets.GITHUB_TOKEN.
        default: ""
      run_ossinsight:
        description: Whether to fetch OSSInsight community-health data as evidence. Set to 'true' to enable.
        default: "false"
      ossinsight_owner:
        description: GitHub owner/org of the OSS repo to analyze with OSSInsight. Required when run_ossinsight is true.
        default: ""
      ossinsight_repo:
        description: GitHub repository name to analyze with OSSInsight. Required when run_ossinsight is true.
        default: ""
      witness_key_path:
        description: Path to a local signing key for Witness. Use for local runs without OIDC. Leave empty in CI (Sigstore is used instead).
        default: ""
      witness_workingdir:
        description: Directory for Witness to run attested commands from.
        default: ""
      enable_sigstore:
        description: Sign attestations with Fulcio. Set to false to skip Witness attestation entirely.
        default: "true"
      enable_archivista:
        description: Upload build attestation to Archivista.
        default: "false"
      github_token:
        description: GitHub token for OLM CLI installation from GHCR. Pass secrets.GITHUB_TOKEN in CI. Leave empty locally.
        default: ""
      olm_cat:
        description: Domain of the CAT instance
        default: ""
      olm_org:
        description: OLM organization name
        default: ""
      olm_identity_token:
        description: OIDC identity token for CAT authentication. Required in GitLab CI — set via id_tokens with aud=cat and pass $OLM_ID_TOKEN. Leave empty for GitHub Actions (auto-detected).
        default: ""
      zarf_path:
        description: Path to the directory containing zarf.yaml
        default: .
      architecture:
        description: Target architecture for the Zarf package
        default: amd64
      zarf_flavor:
        description: Optional flavor to pass to zarf package create. If not set, no flavor will be used.
        required: false
        default: ""
      test_directory:
        description: Path to the test directory to pass to olm vouch. Leave empty to skip.
        default: tests
      extra_attestations:
        description: Comma-separated list of additional witness JSON attestation files to include in vouch
        default: ""
    actions:
      - description: Run security scans then vouch for Zarf package
        shell:
          linux: bash
          darwin: bash
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          EXTRA_ATTESTATIONS="${{ .inputs.extra_attestations }}"
          WITNESS_KEY_PATH="${{ .inputs.witness_key_path }}"
          WITNESS_WORKINGDIR="${{ .inputs.witness_workingdir }}"
          ZARF_FLAVOR="${{ .inputs.zarf_flavor }}"
          RUN_SCORECARD="${{ .inputs.run_scorecard }}"
          RUN_OSSINSIGHT="${{ .inputs.run_ossinsight }}"
          OLM_CAT="${{ .inputs.olm_cat }}"
          OLM_ORG="${{ .inputs.olm_org }}"
          OLM_IDENTITY_TOKEN="${{ .inputs.olm_identity_token }}"

          if [ -n "$OLM_CAT" ] && [ -n "$OLM_ORG" ]; then
            FULCIO_ARGS=(
              --with olm_cat="$OLM_CAT"
              --with olm_org="$OLM_ORG"
              --with github_token="${{ .inputs.github_token }}"
            )
            [ -n "$OLM_IDENTITY_TOKEN" ] && FULCIO_ARGS+=(--with olm_identity_token="$OLM_IDENTITY_TOKEN")
            uds run olm:generate-fulcio-token "${FULCIO_ARGS[@]}"
          fi

          uds run scan:security \
            --with gitleaks_scan_path="${{ .inputs.gitleaks_scan_path }}" \
            --with opengrep_scan_path="${{ .inputs.opengrep_scan_path }}" \
            --with run_opengrep="${{ .inputs.run_opengrep }}" \
            --with witness_key_path="$WITNESS_KEY_PATH" \
            --with witness_workingdir="$WITNESS_WORKINGDIR" \
            --with enable_sigstore="${{ .inputs.enable_sigstore }}" \
            --with enable_archivista="${{ .inputs.enable_archivista }}"

          if [ "$RUN_SCORECARD" = "true" ]; then
            uds run scorecard:run \
              --with scorecard_repo="${{ .inputs.scorecard_repo }}" \
              --with scorecard_local_path="${{ .inputs.scorecard_local_path }}" \
              --with scorecard_token="${{ .inputs.scorecard_token }}" \
              --with witness_key_path="$WITNESS_KEY_PATH" \
              --with witness_workingdir="$WITNESS_WORKINGDIR" \
              --with enable_sigstore="${{ .inputs.enable_sigstore }}"
          fi

          if [ "$RUN_OSSINSIGHT" = "true" ]; then
            uds run ossinsight:run \
              --with ossinsight_owner="${{ .inputs.ossinsight_owner }}" \
              --with ossinsight_repo="${{ .inputs.ossinsight_repo }}" \
              --with witness_key_path="$WITNESS_KEY_PATH" \
              --with witness_workingdir="$WITNESS_WORKINGDIR" \
              --with enable_sigstore="${{ .inputs.enable_sigstore }}"
          fi

          BUILD_ARGS=(
            --with zarf_path="${{ .inputs.zarf_path }}"
            --with architecture="${{ .inputs.architecture }}"
            --with witness_key_path="$WITNESS_KEY_PATH"
            --with witness_workingdir="$WITNESS_WORKINGDIR"
            --with enable_sigstore="${{ .inputs.enable_sigstore }}"
            --with enable_archivista="${{ .inputs.enable_archivista }}"
          )
          if [ -n "$ZARF_FLAVOR" ]; then
            BUILD_ARGS+=(--with zarf_flavor="$ZARF_FLAVOR")
          fi
          uds run build:zarf-package "${BUILD_ARGS[@]}"

          SARIF_FILE_LIST=()
          SCAN_ATTESTATION_LIST=()
          EVIDENCE_FILE_LIST=()
          if [ -s gitleaks.sarif.json ]; then
            SARIF_FILE_LIST+=(gitleaks.sarif.json)
          fi
          if [ -s gitleaks-witness.json ]; then
            SCAN_ATTESTATION_LIST+=(gitleaks-witness.json)
          fi
          if [ "${{ .inputs.run_opengrep }}" = "true" ]; then
            if [ -s opengrep.sarif.json ]; then
              SARIF_FILE_LIST+=(opengrep.sarif.json)
            fi
            if [ -s opengrep-witness.json ]; then
              SCAN_ATTESTATION_LIST+=(opengrep-witness.json)
            fi
          fi
          if [ "$RUN_SCORECARD" = "true" ]; then
            if [ -s scorecard.sarif.json ]; then
              SARIF_FILE_LIST+=(scorecard.sarif.json)
            fi
            if [ -s scorecard-witness.json ]; then
              SCAN_ATTESTATION_LIST+=(scorecard-witness.json)
            fi
          fi
          if [ "$RUN_OSSINSIGHT" = "true" ]; then
            if [ -s ossinsight.json ]; then
              EVIDENCE_FILE_LIST+=(ossinsight.json)
            fi
            if [ -s ossinsight-witness.json ]; then
              SCAN_ATTESTATION_LIST+=(ossinsight-witness.json)
            fi
          fi
          if [ -s zarf-create-witness.json ]; then
            SCAN_ATTESTATION_LIST+=(zarf-create-witness.json)
          fi

          SARIF_FILES=$(IFS=,; echo "${SARIF_FILE_LIST[*]}")
          EVIDENCE_FILES=$(IFS=,; echo "${EVIDENCE_FILE_LIST[*]}")
          ALL_EXTRA=$(IFS=,; echo "${SCAN_ATTESTATION_LIST[*]}")
          if [ -n "$EXTRA_ATTESTATIONS" ]; then
            if [ -n "$ALL_EXTRA" ]; then
              ALL_EXTRA="${ALL_EXTRA},$EXTRA_ATTESTATIONS"
            else
              ALL_EXTRA="$EXTRA_ATTESTATIONS"
            fi
          fi

          VOUCH_ARGS=(
            --with test_directory="${{ .inputs.test_directory }}"
            --with olm_cat="$OLM_CAT"
            --with olm_org="$OLM_ORG"
            --with attestations="${ALL_EXTRA}"
            --with sarif_files="${SARIF_FILES}"
            --with evidence="${EVIDENCE_FILES}"
          )
          uds run vouch:package "${VOUCH_ARGS[@]}"

  - name: pipeline
    description: Full local pipeline - scan, vouch, and publish
    inputs:
      gitleaks_scan_path:
        description: Directory for Gitleaks to scan
        default: .
      opengrep_scan_path:
        description: Path to scan with OpenGrep
        default: .
      run_opengrep:
        description: Whether to run OpenGrep SAST. Set to 'false' to skip.
        default: "true"
      run_scorecard:
        description: Whether to run OpenSSF Scorecard. Set to 'true' to enable.
        default: "false"
      scorecard_repo:
        description: Remote repository for Scorecard to analyze (e.g. github.com/org/repo). Leave empty to analyze the local checkout.
        default: ""
      scorecard_local_path:
        description: Path to the local checkout for Scorecard to analyze when scorecard_repo is empty.
        default: .
      scorecard_token:
        description: GitHub/GitLab API token for Scorecard remote mode. In CI pass secrets.GITHUB_TOKEN.
        default: ""
      run_ossinsight:
        description: Whether to fetch OSSInsight community-health data as evidence. Set to 'true' to enable.
        default: "false"
      ossinsight_owner:
        description: GitHub owner/org of the OSS repo to analyze with OSSInsight. Required when run_ossinsight is true.
        default: ""
      ossinsight_repo:
        description: GitHub repository name to analyze with OSSInsight. Required when run_ossinsight is true.
        default: ""
      witness_key_path:
        description: Path to a local signing key for Witness. Leave empty to auto-generate an ephemeral key for local runs.
        default: ""
      witness_workingdir:
        description: Directory for Witness to run attested commands from.
        default: ""
      enable_sigstore:
        description: Sign attestations with Fulcio. Set to false to skip Witness attestation entirely.
        default: "true"
      enable_archivista:
        description: Upload build attestation to Archivista.
        default: "false"
      github_token:
        description: GitHub token for OLM CLI installation from GHCR. Pass secrets.GITHUB_TOKEN in CI. Leave empty locally.
        default: ""
      olm_cat:
        description: Domain of the CAT instance
        default: ""
      olm_org:
        description: OLM organization name
        default: ""
      olm_identity_token:
        description: OIDC identity token for CAT authentication. Required in GitLab CI — set via id_tokens with aud=cat and pass $OLM_ID_TOKEN. Leave empty for GitHub Actions (auto-detected).
        default: ""
      registry:
        description: OCI registry to publish to
        default: ""
      registry_org:
        description: Organization path within the registry
        default: ""
      registry_user_id:
        description: Registry username for publishing
        default: ""
      registry_password:
        description: Registry password for publishing
        default: ""
      zarf_path:
        description: Path to the directory containing zarf.yaml
        default: .
      architecture:
        description: Target architecture for the Zarf package
        default: amd64
      zarf_flavor:
        description: Optional flavor to pass to zarf package create. If not set, no flavor will be used.
        required: false
        default: ""
      test_directory:
        description: Path to the test directory to pass to olm vouch. Leave empty to skip.
        default: tests
    actions:
      - description: Run full pipeline - scan, vouch, publish
        shell:
          linux: bash
          darwin: bash
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          WITNESS_KEY_PATH="${{ .inputs.witness_key_path }}"
          ZARF_FLAVOR="${{ .inputs.zarf_flavor }}"
          OLM_CAT="${{ .inputs.olm_cat }}"
          OLM_ORG="${{ .inputs.olm_org }}"
          OLM_IDENTITY_TOKEN="${{ .inputs.olm_identity_token }}"
          EPHEMERAL_KEY=""
          if [ -z "$WITNESS_KEY_PATH" ]; then
            EPHEMERAL_KEY=$(mktemp /tmp/ephemeral-XXXXXX.pem)
            openssl genpkey -algorithm ED25519 -out "$EPHEMERAL_KEY" 2>/dev/null
            WITNESS_KEY_PATH="$EPHEMERAL_KEY"
          fi

          if [ -n "$OLM_CAT" ] && [ -n "$OLM_ORG" ]; then
            FULCIO_ARGS=(
              --with olm_cat="$OLM_CAT"
              --with olm_org="$OLM_ORG"
              --with github_token="${{ .inputs.github_token }}"
            )
            [ -n "$OLM_IDENTITY_TOKEN" ] && FULCIO_ARGS+=(--with olm_identity_token="$OLM_IDENTITY_TOKEN")
            uds run olm:generate-fulcio-token "${FULCIO_ARGS[@]}"
          fi

          uds run attest:lint \
            --with witness_key_path="$WITNESS_KEY_PATH" \
            --with witness_workingdir="${{ .inputs.witness_workingdir }}" \
            --with enable_sigstore="${{ .inputs.enable_sigstore }}"

          PIPELINE_ARGS=(
            --with gitleaks_scan_path="${{ .inputs.gitleaks_scan_path }}"
            --with opengrep_scan_path="${{ .inputs.opengrep_scan_path }}"
            --with run_opengrep="${{ .inputs.run_opengrep }}"
            --with run_scorecard="${{ .inputs.run_scorecard }}"
            --with scorecard_repo="${{ .inputs.scorecard_repo }}"
            --with scorecard_local_path="${{ .inputs.scorecard_local_path }}"
            --with scorecard_token="${{ .inputs.scorecard_token }}"
            --with run_ossinsight="${{ .inputs.run_ossinsight }}"
            --with ossinsight_owner="${{ .inputs.ossinsight_owner }}"
            --with ossinsight_repo="${{ .inputs.ossinsight_repo }}"
            --with witness_key_path="$WITNESS_KEY_PATH"
            --with witness_workingdir="${{ .inputs.witness_workingdir }}"
            --with enable_sigstore="${{ .inputs.enable_sigstore }}"
            --with enable_archivista="${{ .inputs.enable_archivista }}"
            --with github_token="${{ .inputs.github_token }}"
            --with olm_cat="$OLM_CAT"
            --with olm_org="$OLM_ORG"
            --with olm_identity_token="$OLM_IDENTITY_TOKEN"
            --with zarf_path="${{ .inputs.zarf_path }}"
            --with architecture="${{ .inputs.architecture }}"
            --with test_directory="${{ .inputs.test_directory }}"
            --with extra_attestations="lint-witness.json"
          )
          if [ -n "$ZARF_FLAVOR" ]; then
            PIPELINE_ARGS+=(--with zarf_flavor="$ZARF_FLAVOR")
          fi
          uds run scan-and-vouch "${PIPELINE_ARGS[@]}"


          if [ -n "$EPHEMERAL_KEY" ]; then
            rm -f "$EPHEMERAL_KEY"
          fi

          REGISTRY="${{ .inputs.registry }}"
          PUBLISH_DRY_RUN="false"
          if [ -z "$REGISTRY" ]; then
            PUBLISH_DRY_RUN="true"
          fi

          uds run publish:zarf-package \
            --with registry="$REGISTRY" \
            --with registry_org="${{ .inputs.registry_org }}" \
            --with registry_user_id="${{ .inputs.registry_user_id }}" \
            --with registry_password="${{ .inputs.registry_password }}" \
            --with dry_run="$PUBLISH_DRY_RUN"
