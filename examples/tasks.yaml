# Example UDS tasks file for use with udm-common shared workflows.
#
# The CI workflow calls `uds run attest:lint`, which wraps your `lint` task
# with Witness attestation. You MUST define a task named `lint` in your repo's
# tasks.yaml — attest:lint calls it. The task must exit non-zero on failures.
#
# Include attest and setup from udm-common so `uds run attest:lint` is available:
#
includes:
  - setup: https://raw.githubusercontent.com/defenseunicorns-udm/udm-common/v0.9.1/tasks/setup.yaml
  - attest: https://raw.githubusercontent.com/defenseunicorns-udm/udm-common/v0.9.1/tasks/attest.yaml
  - scan: https://raw.githubusercontent.com/defenseunicorns-udm/udm-common/v0.9.1/tasks/scan.yaml
  - vouch: https://raw.githubusercontent.com/defenseunicorns-udm/udm-common/v0.9.1/tasks/vouch.yaml
  - publish: https://raw.githubusercontent.com/defenseunicorns-udm/udm-common/v0.9.1/tasks/publish.yaml

# Copy the relevant section below into your repo's tasks.yaml and adapt as needed.

tasks:

  # ---------------------------------------------------------------------------
  # Python — Ruff
  # https://docs.astral.sh/ruff/
  # ---------------------------------------------------------------------------
  - name: lint
    description: Lint Python source with Ruff
    actions:
      - cmd: ruff check .

  # ---------------------------------------------------------------------------
  # Go — golangci-lint
  # https://golangci-lint.run/
  # ---------------------------------------------------------------------------
  # - name: lint
  #   description: "Lint Go source with golangci-lint"
  #   actions:
  #     - cmd: golangci-lint run ./...

  # ---------------------------------------------------------------------------
  # TypeScript / JavaScript — ESLint
  # https://eslint.org/
  # ---------------------------------------------------------------------------
  # - name: lint
  #   description: "Lint TypeScript source with ESLint"
  #   actions:
  #     - cmd: npx eslint .

  # ---------------------------------------------------------------------------
  # Monorepo — run linters per service
  # Scope each linter to its service directory so failures are isolated.
  # ---------------------------------------------------------------------------
  # - name: lint
  #   description: "Lint all services"
  #   actions:
  #     - cmd: ruff check services/api
  #     - cmd: golangci-lint run ./services/worker/...
  #     - cmd: npx eslint services/frontend

  # ---------------------------------------------------------------------------
  # Custom Zarf build command
  # Use build_command when your build requires pre-processing, non-standard flags,
  # or a multi-step script instead of plain 'uds zarf package create'.
  # The command still runs under Witness attestation; output is zarf-create-witness.json.
  # ---------------------------------------------------------------------------
  # - name: build
  #   description: Build Zarf package with a custom build script
  #   actions:
  #     - task: build:zarf-package
  #       with:
  #         build_command: ./scripts/my-build.sh

  # Equivalent via vouch (builds + vouches in one step):
  # - name: vouch
  #   description: Build and vouch with a custom build script
  #   actions:
  #     - task: vouch:package
  #       with:
  #         build_command: ./scripts/my-build.sh
  #         olm_cat: cat-api.uds-mil.us
  #         olm_org: <your-org-name>
