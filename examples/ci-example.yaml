# This is an example GitHub Actions workflow that demonstrates how to use UDM Common tasks in a CI pipeline. It includes steps for linting, security scanning, vouching, and publishing a package. You can customize the tasks and parameters as needed for your specific project.
name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: UDS CLI Setup
        uses: defenseunicorns-udm/udm-common/.github/actions/uds-cli-setup@560fc17745c6b3817d5c1d7c449081be19c59f3a # v0.12.0

      # attest:lint wraps your repo's 'lint' task with Witness attestation.
      # You MUST define a 'lint' task in your tasks.yaml — see examples/tasks.yaml.
      - name: Lint
        run: uds run attest:lint

      - name: Security Scan
        run: uds run scan:security \
          --with opengrep_scan_path=/path/to/source_code # Adjust this as needed for your project

      # --with build_command is optional. Use it if your build process is more complex than 'zarf package create' and requires additional setup steps.
      # The command will run under Witness attestation, and you can use the same environment variables as in the zarf-package task (e.g. $ZARF_PATH, $ARCHITECTURE) to customize it.
      # It is expected that this command will produce a zarf package. If you use this, the zarf_path and architecture inputs will be ignored since those should be handled in your custom command.
      - name: Vouch
        run: |
          uds run vouch:package \
            --with github_token="${{ secrets.GITHUB_TOKEN }}" \
            --with attestations="lint-witness.json,gitleaks-witness.json,opengrep-witness.json" \
            --with sarif_files="gitleaks.sarif.json,opengrep.sarif.json" \
            --with olm_cat=cat-api.uds-mil.us \
            --with olm_org="<your-org-name>"

      - name: Publish
        run: |
          uds run publish:zarf-package \
            --with registry_org="<your-org-name>" \
            --with registry_user_id="${{ secrets.REGISTRY_USER_ID }}" \
            --with registry_password="${{ secrets.REGISTRY_PASSWORD }}"
