# Example GitHub Actions workflow using UDM Common tasks.
# Each step calls a discrete task — lint, scan, build, sign, vouch, publish.
# Include the relevant task namespaces in your repo's tasks.yaml (see examples/tasks.yaml).
name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: UDS CLI Setup
        uses: defenseunicorns-udm/udm-common/.github/actions/uds-cli-setup@9aaad66b21c7637b5be3d6aafdb21c9e7ff1df2a # v0.10.3

      # attest:lint wraps your repo's 'lint' task with Witness attestation.
      # You MUST define a 'lint' task in your tasks.yaml — see examples/tasks.yaml.
      - name: Lint
        run: uds run attest:lint

      - name: Security Scan
        run: |
          uds run scan:security \
            --with opengrep_scan_path=. # Adjust as needed for your project

      # --with build_command is optional. Use it when your build requires more than
      # 'uds zarf package create' (e.g. pre-processing, non-standard flags).
      - name: Build
        run: uds run build:zarf-package

      - name: Sign
        run: |
          uds run sign:artifacts \
            --with zarf_package="$(find . -maxdepth 1 -name 'zarf-package-*.tar.zst' -type f -newer /dev/null | head -1)" \
            --with registry_org="<your-org-name>" \
            --with registry_user_id="${{ secrets.REGISTRY_USER_ID }}" \
            --with registry_password="${{ secrets.REGISTRY_PASSWORD }}" \
            --with cosign_key_path="${{ secrets.COSIGN_KEY_PATH }}"

      - name: Vouch
        run: |
          uds run vouch:package \
            --with attestations="lint-witness.json,gitleaks-witness.json,opengrep-witness.json,zarf-create-witness.json" \
            --with sarif_files="gitleaks.sarif.json,opengrep.sarif.json" \
            --with olm_cat="<cat-domain>" \
            --with olm_org="<your-org-name>"

      - name: Publish
        run: |
          uds run publish:zarf-package \
            --with registry_org="<your-org-name>" \
            --with registry_user_id="${{ secrets.REGISTRY_USER_ID }}" \
            --with registry_password="${{ secrets.REGISTRY_PASSWORD }}"
