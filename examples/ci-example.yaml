# This is an example GitHub Actions workflow that demonstrates how to use UDM Common tasks in a CI pipeline. It includes steps for linting, security scanning, vouching, and publishing a package. You can customize the tasks and parameters as needed for your specific project.
name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: UDS CLI Setup
        uses: defenseunicorns-udm/udm-common/.github/actions/uds-cli-setup@286b9cf5203653352a3c9771d01f973a6fa4d185 # v0.13.1

      # Must run before any Witness-attested step. Mints a short-lived token at .fulcio-token
      # used by attest:lint, scan:security, and build:zarf-package for keyless signing.
      - name: Generate Fulcio Token
        run: |
          uds run olm:generate-fulcio-token \
            --with olm_cat="cat-api.uds-mil.us" \
            --with olm_org="<your-org-name>" \
            --with github_token="${{ secrets.GITHUB_TOKEN }}"

      # attest:lint wraps your repo's 'lint' task with Witness attestation.
      # You MUST define a 'lint' task in your tasks.yaml — see examples/tasks.yaml.
      - name: Lint
        run: uds run attest:lint

      - name: Security Scan
        run: |
          uds run scan:security \
            --with opengrep_scan_path=/path/to/source_code # Adjust this as needed for your project

      # --with build_command is optional. Use it if your build process is more complex than
      # 'zarf package create' and requires additional setup steps.
      - name: Build
        run: uds run build:zarf-package

      - name: Vouch
        run: |
          uds run vouch:package \
            --with github_token="${{ secrets.GITHUB_TOKEN }}" \
            --with attestations="lint-witness.json,gitleaks-witness.json,opengrep-witness.json,zarf-create-witness.json" \
            --with sarif_files="gitleaks.sarif.json,opengrep.sarif.json" \
            --with olm_cat=cat-api.uds-mil.us \
            --with olm_org="<your-org-name>"
            # Optional: pass a uds-bundle.yaml to enable Customer Deployment (sandbox preview).
            # --with uds_bundle="uds-bundle.yaml"

      - name: Publish
        run: |
          uds run publish:zarf-package \
            --with registry_org="<your-org-name>" \
            --with registry_user_id="${{ secrets.REGISTRY_USER_ID }}" \
            --with registry_password="${{ secrets.REGISTRY_PASSWORD }}"
