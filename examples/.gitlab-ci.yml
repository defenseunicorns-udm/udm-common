# Annotated GitLab CI example for UDM Common.
#
# This pipeline produces signed evidence for lint, secret scan, SAST, and
# package build; submits that evidence to CAT via `vouch:package`; then
# publishes the resulting Zarf package to an OCI registry.
#
# Signing uses fulcio.uds-mil.us via a CAT-brokered token (not fulcio.sigstore.dev).
# Each job that runs Witness-attested steps must generate its own .fulcio-token
# via olm:generate-fulcio-token before those steps run.
#
# Quickstart: run `uds run setup:generate --with platform=gitlab --with repo_pattern=dedicated`
# to generate a ready-to-fill version of this file automatically.

stages:
  - ci
  - publish

variables:
  # renovate: datasource=github-releases depName=defenseunicorns/uds-cli
  UDS_VERSION: v0.33.0
  OLM_CAT: cat-api.uds-mil.us
  OLM_ORG: <your-org-name>   # Replace with your CAT organization name (provided during onboarding)

.uds-cache: &uds-cache
  cache:
    key: uds-${UDS_VERSION}
    paths:
      - .cache/uds-bin/

# Bootstrap runtime dependencies. The udm-common setup tasks install
# Witness/cosign/OLM as needed; this block only brings `uds` onto the runner.
.install-deps: &install-deps
  - apt-get update -qq && apt-get install -y -qq curl
  - mkdir -p .cache/uds-bin
  - |
    if [ ! -f ".cache/uds-bin/uds" ]; then
      curl --retry-all-errors --retry 5 -fSL \
        "https://github.com/defenseunicorns/uds-cli/releases/download/${UDS_VERSION}/uds-cli_${UDS_VERSION}_Linux_amd64" \
        -o .cache/uds-bin/uds
      chmod +x .cache/uds-bin/uds
    fi
    cp .cache/uds-bin/uds /usr/local/bin/uds

ci:
  stage: ci
  <<: *uds-cache

  # Use an image that has the language/runtime your lint/build tasks require.
  # Example: node:24 for Node.js, python:3.12 for Python, golang:1.22 for Go.
  image: ubuntu:latest

  # Request a CAT-audience OIDC token for Fulcio signing via olm:generate-fulcio-token.
  # The token is written to .fulcio-token and read by Witness-attested tasks.
  id_tokens:
    OLM_ID_TOKEN:
      aud: cat

  before_script:
    - *install-deps

  script:
    # Generate a Fulcio signing token via CAT before any Witness-attested step.
    # Token is written to .fulcio-token and read automatically by attest/scan/build tasks.
    - |
      uds run olm:generate-fulcio-token \
        --with olm_cat="$OLM_CAT" \
        --with olm_org="$OLM_ORG" \
        --with olm_identity_token="$OLM_ID_TOKEN"

    # attest:lint wraps your repo's `lint` task with Witness.
    # Define that task in tasks.yaml; see examples/tasks.yaml.
    - uds run attest:lint

    # Adjust scan paths to match your source directory layout.
    - |
      uds run scan:security \
        --with opengrep_scan_path="." \
        --with gitleaks_scan_path="."

  # Pass witness attestations and SARIF reports to the publish job.
  artifacts:
    paths:
      - lint-witness.json
      - gitleaks-witness.json
      - opengrep-witness.json
      - gitleaks.sarif.json
      - opengrep.sarif.json
    when: always
    expire_in: 1 day

publish:
  stage: publish
  <<: *uds-cache

  # Use an image that has Docker available if your build requires it.
  # For Zarf package builds that need Docker, add: services: [docker:dind]
  image: ubuntu:latest

  # OLM_ID_TOKEN authenticates to CAT to mint a Fulcio signing token.
  # Each job generates its own token — .fulcio-token from the ci job is
  # not transferred (gitignored, separate runner).
  id_tokens:
    OLM_ID_TOKEN:
      aud: cat

  needs:
    - job: ci
      artifacts: true
      optional: true

  before_script:
    - *install-deps

  script:
    # Refresh the Fulcio token before the build step.
    # build:zarf-package can exceed 30 minutes; token is minted fresh here.
    - |
      uds run olm:generate-fulcio-token \
        --with olm_cat="$OLM_CAT" \
        --with olm_org="$OLM_ORG" \
        --with olm_identity_token="$OLM_ID_TOKEN"

    # Pass build_command if your build requires steps beyond `uds zarf package create`.
    - uds run build:zarf-package

    - |
      uds run vouch:package \
        --with olm_cat="$OLM_CAT" \
        --with olm_org="$OLM_ORG" \
        --with olm_identity_token="$OLM_ID_TOKEN" \
        --with attestations="lint-witness.json,gitleaks-witness.json,opengrep-witness.json,zarf-create-witness.json" \
        --with sarif_files="gitleaks.sarif.json,opengrep.sarif.json"

    # REGISTRY_USER_ID and REGISTRY_PASSWORD must be set as masked CI/CD variables
    # (Settings > CI/CD > Variables). REGISTRY_ORG is your organization path in registry.uds-mil.us.
    - |
      uds run publish:zarf-package \
        --with registry="registry.uds-mil.us" \
        --with registry_org="<your-registry-org>" \
        --with registry_user_id="$REGISTRY_USER_ID" \
        --with registry_password="$REGISTRY_PASSWORD"
