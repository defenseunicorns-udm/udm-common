# Annotated GitLab CI example for UDM Common.
#
# Adapted from the public enxo/oootp GitLab pipeline:
# https://gitlab.com/enxo/oootp/-/blob/feat/ci-workflow/.gitlab-ci.yml
#
# GitLab's default CI config filename is `.gitlab-ci.yml` at repo root.
#
# This pipeline produces signed evidence for lint, secret scan, SAST, and
# package build; submits that evidence to CAT via `vouch:package`; then
# optionally publishes the resulting Zarf package to an OCI registry.
#
# Project-specific values from enxo/oootp are called out inline. Replace them
# before copying this file into another project.

stages:
  - ci
  - publish

variables:
  # Generic: pin the UDS CLI version used by the pipeline.
  # renovate: datasource=github-releases depName=defenseunicorns/uds-cli
  UDS_VERSION: v0.31.0

  # Generic: required when using the docker:dind service without TLS.
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

  # Project-specific: enxo/oootp submits CAT evidence under this org.
  # Replace with the CAT endpoint and organization for your project.
  OLM_CAT: cat-api.uds-mil.us
  OLM_ORG: uds-army-demo

.uds-cache: &uds-cache
  cache:
    key: uds-${UDS_VERSION}
    paths:
      - .cache/uds-bin/

# Generic: bootstrap runtime dependencies needed by these example jobs.
# The udm-common setup tasks install Witness/cosign/OLM as needed; this block
# only gets the runner to the point where it can run `uds`.
.install-deps: &install-deps
  - apt-get update -qq && apt-get install -y -qq curl docker.io
  - mkdir -p ~/.docker/cli-plugins
  - |
    BUILDX_VERSION=$(curl -fsSL https://api.github.com/repos/docker/buildx/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
    curl --retry-all-errors --retry 5 -fsSL \
      "https://github.com/docker/buildx/releases/download/${BUILDX_VERSION}/buildx-${BUILDX_VERSION}.linux-amd64" \
      -o ~/.docker/cli-plugins/docker-buildx
    chmod +x ~/.docker/cli-plugins/docker-buildx
  - docker buildx version
  - mkdir -p .cache/uds-bin
  - |
    if [ ! -f ".cache/uds-bin/uds" ]; then
      curl --retry-all-errors --retry 5 -fSL \
        "https://github.com/defenseunicorns/uds-cli/releases/download/${UDS_VERSION}/uds-cli_${UDS_VERSION}_Linux_amd64" \
        -o .cache/uds-bin/uds
      chmod +x .cache/uds-bin/uds
    fi
    cp .cache/uds-bin/uds /usr/local/bin/uds

ci:
  stage: ci
  <<: *uds-cache

  # Project-specific: enxo/oootp is a Node/Turbo repo. Use an image that has
  # the language/runtime your project's lint/build tasks require.
  image: node:24

  # Generic for GitLab Sigstore signing: request an OIDC token with audience
  # `sigstore`, then pass the GitLab issuer to UDM Common tasks.
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore

  # Generic when package builds or scans need Docker.
  services:
    - name: docker:24-dind
      command: --tls=false

  before_script:
    - *install-deps

  script:
    # Project-specific: enxo/oootp needs npm dependencies before `uds run lint`
    # because its lint task calls `npm run lint`, which calls Turbo.
    - npm ci

    # Generic: attest:lint wraps your repo's `lint` task with Witness.
    # Define that task in tasks.yaml; see examples/tasks.yaml.
    - |
      uds run attest:lint \
        --with fulcio_oidc_issuer="$CI_SERVER_URL"

    # Project-specific: enxo/oootp scans apps/. Replace with your source path.
    - |
      uds run scan:security \
        --with opengrep_scan_path=apps/ \
        --with fulcio_oidc_issuer="$CI_SERVER_URL"

  # Generic: pass witness attestations and SARIF reports to the publish job so
  # vouch:package can submit the full evidence set to CAT.
  artifacts:
    paths:
      - lint-witness.json
      - gitleaks-witness.json
      - opengrep-witness.json
      - gitleaks.sarif.json
      - opengrep.sarif.json
    when: always
    expire_in: 1 day

publish:
  stage: publish
  <<: *uds-cache

  # Project-specific: enxo/oootp uses Node for its build command.
  image: node:24

  # Generic:
  # - OLM_ID_TOKEN authenticates to CAT/OLM using audience `cat`.
  # - SIGSTORE_ID_TOKEN signs the package build attestation with Fulcio.
  id_tokens:
    OLM_ID_TOKEN:
      aud: cat
    SIGSTORE_ID_TOKEN:
      aud: sigstore

  services:
    - name: docker:24-dind
      command: --tls=false

  needs:
    - job: ci
      artifacts: true
      optional: true

  before_script:
    - *install-deps

  script:

    # Project-specific:
    # - `uds run build-images` is an enxo/oootp build task.
    # - Replace build_command with your package build command, or omit it to
    #   let vouch:package use the default `uds zarf package create` behavior.
    - |
      uds run build:zarf-package \
          --with fulcio_oidc_issuer="$CI_SERVER_URL"
    - |
      uds run vouch:package \
        --with olm_cat="$OLM_CAT" \
        --with olm_org="$OLM_ORG" \
        --with fulcio_oidc_issuer="$CI_SERVER_URL" \
        --with olm_identity_token="$OLM_ID_TOKEN" \
        --with attestations="lint-witness.json,gitleaks-witness.json,opengrep-witness.json" \
        --with sarif_files="gitleaks.sarif.json,opengrep.sarif.json" \
        --with build_command="uds run build-images"

    # Generic: publishing is independent from CAT/vouch compliance evidence.
    # Configure REGISTRY_USER_ID and REGISTRY_PASSWORD as masked GitLab CI/CD
    # variables, or set dry_run=true when no registry is available.
    - |
      uds run publish:zarf-package \
        --with registry="registry.uds-mil.us" \
        --with registry_org="$OLM_ORG" \
        --with registry_user_id="$REGISTRY_USER_ID" \
        --with registry_password="$REGISTRY_PASSWORD"
